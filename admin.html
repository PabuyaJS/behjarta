/* ════════════════════════════
   API HELPERS — JSONP
════════════════════════════ */
function jsonp(url, params = {}, timeoutMs = 12000) {
  return new Promise((resolve, reject) => {
    const cbName = '__bh_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const qs = new URLSearchParams({ ...params, callback: cbName }).toString();
    const script = document.createElement('script');
    const timer = setTimeout(() => { cleanup(); reject(new Error('Timeout')); }, timeoutMs);
    function cleanup() { clearTimeout(timer); delete window[cbName]; if (script.parentNode) script.parentNode.removeChild(script); }
    window[cbName] = (data) => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('Nätverksfel')); };
    script.src = `${url}?${qs}`;
    document.head.appendChild(script);
  });
}
async function fetchSheet(sheetName) {
  const res = await jsonp(CONFIG.APPS_SCRIPT_URL, { sheet: sheetName });
  if (!res.success) throw new Error(res.error || 'Okänt fel');
  return res.data;
}
async function updateSheetRow(sheetName, idKey, idValue, updatedRow) {
  const res = await jsonp(CONFIG.APPS_SCRIPT_URL, { action:'update', sheet:sheetName, idKey, idValue:String(idValue), row:JSON.stringify(updatedRow) });
  if (!res.success) throw new Error(res.error || 'Uppdatering misslyckades');
}
function useSheetData(mockKey, sheetName) {
  const [data, setData]       = useState(MOCK[mockKey] || []);
  const [loading, setLoading] = useState(false);
  const [error, setError]     = useState(null);
  const refresh = useCallback(async () => {
    if (CONFIG.DEMO_MODE) { setData([...(MOCK[mockKey] || [])]); return; }
    setLoading(true); setError(null);
    try { setData(await fetchSheet(sheetName)); } catch(e) { setError(e.message); }
    setLoading(false);
  }, [mockKey, sheetName]);
  useEffect(() => { refresh(); }, []);
  const saveRow = useCallback(async (idKey, idValue, updatedRow) => {
    if (CONFIG.DEMO_MODE) { setData(prev => prev.map(r => String(r[idKey]) === String(idValue) ? { ...r, ...updatedRow } : r)); return; }
    await updateSheetRow(sheetName, idKey, idValue, updatedRow);
    await refresh();
  }, [sheetName, refresh]);
  return { data, loading, error, refresh, saveRow };
}

/* ════════════════════════════

const BADGE_MAP = {
  'Ja':'#D1FAE5:#065F46','ja':'#D1FAE5:#065F46',
  'Nej':'#FEE2E2:#991B1B','nej':'#FEE2E2:#991B1B',

function Badge({ val }) {

  return <span style={{ background:parts[0], color:parts[1], padding:'2px 10px', borderRadius:999, fontSize:11, fontWeight:700, whiteSpace:'nowrap' }}>{v || '—'}</span>;
}

/* ════════════════════════════
   DATE / TIME HELPERS
════════════════════════════ */
function renderDate(val) {
  if (val == null || val === '') return '—';
  const s = String(val).trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const d = new Date(s.includes('T') ? s : s.replace(' ', 'T'));
  if (isNaN(d)) return s;
  return d.toLocaleDateString('sv-SE', { timeZone: 'Europe/Stockholm' });
}
function renderTime(val) {
  if (val == null || val === '') return '—';
  const s = String(val).trim();
  if (/^\d{2}:\d{2}/.test(s)) return s.slice(0, 5);
  if (s.includes('T')) {
    if (s.startsWith('1899-12-30') || s.startsWith('1899-12-29')) return s.split('T')[1].slice(0, 5);
    const d = new Date(s);
    if (isNaN(d)) return s;
    return d.toLocaleTimeString('sv-SE', { hour:'2-digit', minute:'2-digit', timeZone:'Europe/Stockholm' });
  }
  return s.slice(0, 5);
}

 /* ════════════════════════════
   FORMAT ROW FOR SAVE
   Normalises date/time/datetime fields before writing back to the sheet.
   - date fields  → yyyy-MM-dd
   - time fields  → HH:mm:ss
   - datetime fields → M/d/yyyy HH:mm:ss
════════════════════════════ */
const DATE_KEYS = new Set([
  'Date','created_at','Contract_sent_date','Contract_start_date',
  'Contract_resignation_date','Contract_end_date','contract_start_date',
  '6_months_probation','contract_end_date','Discount_exparation','date'
]);
const TIME_KEYS = new Set([
  'Time','start_time','end_time',
  'shift_start_1','shift_end_1','shift_start_2','shift_end_2','shift_start_3','shift_end_3'
]);
const DATETIME_KEYS = new Set(['created_at']); // add more if needed

function formatForSheet(key, val) {
  if (val == null || val === '') return val;
  const s = String(val).trim();

  if (TIME_KEYS.has(key)) {
    // Already clean HH:mm or HH:mm:ss
    if (/^\d{2}:\d{2}(:\d{2})?$/.test(s)) return s.length === 5 ? s + ':00' : s;
    // Sheets epoch 1899-12-30THH:mm:ss.000Z
    if (s.includes('T')) {
      const timePart = s.split('T')[1] || '';
      const hms = timePart.slice(0, 8); // HH:mm:ss
      return hms || s;
    }
    return s;
  }

  if (DATE_KEYS.has(key) && !DATETIME_KEYS.has(key)) {
    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    // ISO datetime → strip time
    if (s.includes('T')) return s.split('T')[0];
    // Try parsing
    const d = new Date(s.replace(' ', 'T'));
    if (!isNaN(d)) return d.toLocaleDateString('sv-SE', { timeZone:'Europe/Stockholm' }); // yyyy-MM-dd
    return s;
  }

  // datetime: M/d/yyyy HH:mm:ss  (Sheets default import format)
  if (DATETIME_KEYS.has(key)) {
    const d = new Date(s.includes('T') ? s : s.replace(' ', 'T'));
    if (!isNaN(d)) {
      const mo = d.getMonth() + 1;
      const dy = d.getDate();
      const yr = d.getFullYear();
      const hh = String(d.getHours()).padStart(2,'0');
      const mm = String(d.getMinutes()).padStart(2,'0');
      const ss = String(d.getSeconds()).padStart(2,'0');
      return `${mo}/${dy}/${yr} ${hh}:${mm}:${ss}`;
    }
    return s;
  }

  return val;
}

function formatRowForSheet(row) {
  const out = {};
  for (const [k, v] of Object.entries(row)) {
    out[k] = formatForSheet(k, v);
  }
  return out;
}

/* parse a date field into a yyyy-MM-dd string or '' */
function toYMD(val) {
  if (!val || val === '—') return '';
  const s = String(val).trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const d = new Date(s.includes('T') ? s : s.replace(' ', 'T'));
  if (isNaN(d)) return '';
  return d.toLocaleDateString('sv-SE', { timeZone:'Europe/Stockholm' });
}

/* ════════════════════════════
   DATE RANGE PICKER
════════════════════════════ */
function getMonthRange() {
  const now = new Date();
  const y = now.getFullYear();
  const m = now.getMonth();
  const first = new Date(y, m, 1);
  const last  = new Date(y, m + 1, 0);
  const fmt = d => d.toLocaleDateString('sv-SE');
  return { from: fmt(first), to: fmt(last) };
}

const SV_MONTHS = ['Januari','Februari','Mars','April','Maj','Juni','Juli','Augusti','September','Oktober','November','December'];
const SV_DAYS   = ['Mån','Tis','Ons','Tor','Fre','Lör','Sön'];

function MiniCalendar({ year, month, selectedFrom, selectedTo, hoverDate, onDateClick, onDateHover }) {
  const firstDay = new Date(year, month, 1);
  // Monday-first: 0=Mon..6=Sun
  let startDow = firstDay.getDay(); // 0=Sun..6=Sat
  startDow = startDow === 0 ? 6 : startDow - 1;
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < startDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) {
    const ymd = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    cells.push(ymd);
  }

  const inRange = (ymd) => {
    if (!ymd) return false;
    const lo = selectedFrom || '';
    const hi = (hoverDate && selectedFrom && !selectedTo)
      ? (hoverDate >= selectedFrom ? hoverDate : selectedFrom)
      : (selectedTo || '');
    const hiReal = (hoverDate && selectedFrom && !selectedTo)
      ? (hoverDate >= selectedFrom ? hoverDate : selectedFrom)
      : selectedTo;
    if (!lo || !hiReal) return false;
    return ymd > lo && ymd < hiReal;
  };
  const isFrom  = ymd => ymd && ymd === selectedFrom;
  const isTo    = ymd => ymd && ymd === selectedTo;
  const isHov   = ymd => ymd && !selectedTo && hoverDate === ymd && selectedFrom;

  return (
    <div style={{ width:220 }}>
      <div style={{ textAlign:'center', fontWeight:700, fontSize:13, color:T.text, marginBottom:10 }}>
        {SV_MONTHS[month]} {year}
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:2, marginBottom:4 }}>
        {SV_DAYS.map(d => (
          <div key={d} style={{ textAlign:'center', fontSize:10, fontWeight:700, color:T.muted }}>{d}</div>
        ))}
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:2 }}>
        {cells.map((ymd, i) => {
          if (!ymd) return <div key={`e${i}`} />;
          const from  = isFrom(ymd);
          const to    = isTo(ymd);
          const range = inRange(ymd);
          const hov   = isHov(ymd);
          let bg = 'transparent', color = T.text, br = 6, fw = 400;
          if (from || to) { bg = T.primary; color = '#fff'; fw = 700; }
          else if (range || hov) { bg = T.primaryLight; color = T.primaryDark; }
          return (
            <div key={ymd}
              onClick={() => onDateClick(ymd)}
              onMouseEnter={() => onDateHover(ymd)}
              style={{ textAlign:'center', fontSize:12, padding:'5px 2px', borderRadius:br,
                background:bg, color, fontWeight:fw, cursor:'pointer', transition:'background 0.1s' }}
              onMouseDown={e => e.preventDefault()}>
              {parseInt(ymd.split('-')[2])}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function DateRangePicker({ from, to, onChange }) {
  const [open, setOpen]       = useState(false);
  const [hoverDate, setHover] = useState(null);
  const [selecting, setSelecting] = useState(false); // false=picking from, true=picking to
  const [tempFrom, setTempFrom]   = useState(from);
  const [tempTo, setTempTo]       = useState(to);
  const [viewYear1, setVY1]       = useState(() => { const d = new Date(); return d.getFullYear(); });
  const [viewMonth1, setVM1]      = useState(() => { const d = new Date(); return d.getMonth(); });
  const popRef = useRef(null);
  const btnRef = useRef(null);
  const [pos, setPos] = useState({ top:0, left:0 });

  // Month 2 is always month1+1
  const month2 = viewMonth1 === 11 ? 0 : viewMonth1 + 1;
  const year2  = viewMonth1 === 11 ? viewYear1 + 1 : viewYear1;

  useEffect(() => { setTempFrom(from); setTempTo(to); }, [from, to]);

  useEffect(() => {
    if (!open) return;
    const handler = e => {
      if (popRef.current && !popRef.current.contains(e.target) && btnRef.current && !btnRef.current.contains(e.target)) setOpen(false);
    };
    setTimeout(() => document.addEventListener('mousedown', handler), 0);
    return () => document.removeEventListener('mousedown', handler);
  }, [open]);

  const openPicker = () => {
    if (btnRef.current) {
      const r = btnRef.current.getBoundingClientRect();
      setPos({ top: r.bottom + 6, left: r.left });
    }
    setSelecting(false);
    setOpen(o => !o);
  };

  const handleDateClick = (ymd) => {
    if (!selecting) {
      setTempFrom(ymd); setTempTo(null); setSelecting(true);
    } else {
      if (ymd < tempFrom) { setTempFrom(ymd); setTempTo(tempFrom); }
      else { setTempTo(ymd); }
      setSelecting(false);
    }
  };

  const apply = () => {
    if (tempFrom && tempTo) { onChange({ from: tempFrom, to: tempTo }); setOpen(false); }
  };
  const reset = () => {
    const def = getMonthRange();
    setTempFrom(def.from); setTempTo(def.to);
    onChange(def); setOpen(false);
  };

  const prevMonth = () => {
    if (viewMonth1 === 0) { setVM1(11); setVY1(y => y - 1); }
    else setVM1(m => m - 1);
  };
  const nextMonth = () => {
    if (viewMonth1 === 11) { setVM1(0); setVY1(y => y + 1); }
    else setVM1(m => m + 1);
  };

  const label = (from && to)
    ? `${from}  →  ${to}`
    : 'Välj datumintervall';

  return (
    <>
      <div ref={btnRef} className="date-range-bar" onClick={openPicker}
        style={{ display:'flex', alignItems:'center', gap:8, minWidth:240 }}>
        <span style={{ fontSize:14 }}>📅</span>
        <span style={{ flex:1, fontSize:13, color: (from&&to) ? T.text : T.muted }}>{label}</span>
        <span style={{ fontSize:10, color:T.muted }}>▾</span>
      </div>
      {open && ReactDOM.createPortal(
        <div ref={popRef} className="date-picker-popup" style={{ top:pos.top, left:pos.left }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
            <button onClick={prevMonth} style={{ background:'none', border:`1px solid ${T.border}`, borderRadius:7, padding:'4px 10px', color:T.muted, fontSize:14, cursor:'pointer' }}>‹</button>
            <div style={{ fontSize:12, color:T.muted, fontWeight:600 }}>
              {selecting ? '📌 Välj slutdatum' : '📌 Välj startdatum'}
            </div>
            <button onClick={nextMonth} style={{ background:'none', border:`1px solid ${T.border}`, borderRadius:7, padding:'4px 10px', color:T.muted, fontSize:14, cursor:'pointer' }}>›</button>
          </div>
          <div style={{ display:'flex', gap:28 }}>
            <MiniCalendar year={viewYear1} month={viewMonth1}
              selectedFrom={tempFrom} selectedTo={tempTo} hoverDate={hoverDate}
              onDateClick={handleDateClick} onDateHover={setHover} />
            <MiniCalendar year={year2} month={month2}
              selectedFrom={tempFrom} selectedTo={tempTo} hoverDate={hoverDate}
              onDateClick={handleDateClick} onDateHover={setHover} />
          </div>
          <div style={{ display:'flex', gap:8, marginTop:14, paddingTop:12, borderTop:`1px solid ${T.border}`, alignItems:'center' }}>
            <span style={{ fontSize:12, color:T.muted, flex:1 }}>
              {tempFrom && tempTo ? `${tempFrom}  →  ${tempTo}` : tempFrom ? `${tempFrom}  →  …` : 'Inget intervall valt'}
            </span>
            <button onClick={reset} style={{ padding:'6px 14px', border:`1px solid ${T.border}`, borderRadius:8, background:'#F9FAFB', color:T.muted, fontSize:12, fontWeight:600, cursor:'pointer' }}>Denna månad</button>
            <button onClick={apply} disabled={!tempFrom || !tempTo}
              style={{ padding:'6px 16px', border:'none', borderRadius:8, background:(!tempFrom||!tempTo)?T.border:T.primary, color:'#fff', fontSize:12, fontWeight:600, cursor:(!tempFrom||!tempTo)?'not-allowed':'pointer' }}>
              Använd
            </button>
          </div>
        </div>,
        document.body
      )}
    </>
  );
}

                    <input type="text" value={form[k]??''} readOnly={isRO} onChange={e => set(k, e.target.value)} />

        <div style={{ padding:'14px 24px', borderTop:`1px solid ${T.border}`, display:'flex', gap:10, justifyContent:'flex-end', flexShrink:0 }}>
          {editMode ? (
            <>
              <button onClick={() => { setEditMode(false); setForm({...row}); setErr(''); }}

/* ════════════════════════════
   FILTER POPOVER
════════════════════════════ */
function FilterPopover({ colKey, colLabel, allValues, currentFilter, onSort, onSetFilter, onClose, anchor }) {
  const ref = useRef(null);
  const [search, setSearch] = useState('');
  const [selected, setSelected] = useState(() =>
    currentFilter ? new Set(currentFilter) : new Set(allValues)
  );
  useEffect(() => {
    const handler = e => { if (ref.current && !ref.current.contains(e.target)) onClose(); };
    const id = setTimeout(() => document.addEventListener('mousedown', handler), 0);
    return () => { clearTimeout(id); document.removeEventListener('mousedown', handler); };
  }, [onClose]);
  const displayValues = useMemo(() =>
    allValues.filter(v => String(v).toLowerCase().includes(search.toLowerCase())),
    [allValues, search]
  );
  const allChecked  = displayValues.length > 0 && displayValues.every(v => selected.has(v));
  const someChecked = !allChecked && displayValues.some(v => selected.has(v));
  const toggleValue = v => setSelected(prev => { const next = new Set(prev); next.has(v) ? next.delete(v) : next.add(v); return next; });
  const applyFilter = () => { const allSel = allValues.every(v => selected.has(v)); onSetFilter(colKey, allSel ? null : new Set(selected)); onClose(); };
  const left = Math.min(anchor.left, window.innerWidth - 248);
  const top  = anchor.bottom + 3;
  const SortBtn = ({ dir, label }) => {
    const [hov, setHov] = useState(false);
    return (
      <button onClick={() => { onSort(colKey, dir); onClose(); }} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
        style={{ display:'flex', alignItems:'center', gap:8, width:'100%', padding:'5px 8px', background:hov?T.primaryLight:'transparent', border:'none', borderRadius:6, textAlign:'left', fontSize:13, color:hov?T.primaryDark:T.text, cursor:'pointer', fontFamily:'inherit', fontWeight:500 }}>
        {label}
      </button>
    );
  };
  return ReactDOM.createPortal(
    <div ref={ref} style={{ position:'fixed', top, left, width:242, zIndex:999999, background:'#fff', border:`1px solid ${T.border}`, borderRadius:10, boxShadow:'0 10px 36px rgba(0,0,0,0.18)', fontFamily:"'Plus Jakarta Sans',sans-serif", overflow:'hidden' }}>
      <div style={{ padding:'8px 10px 6px', background:T.primaryLight, borderBottom:`1px solid ${T.border}` }}>
        <div style={{ fontSize:11, fontWeight:700, color:T.primaryDark, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{colLabel}</div>
      </div>
      <div style={{ padding:'6px 6px 4px', borderBottom:`1px solid ${T.border}` }}>
        <div style={{ fontSize:10, fontWeight:700, color:T.muted, textTransform:'uppercase', letterSpacing:'0.06em', padding:'0 4px 4px' }}>Sortering</div>
        <SortBtn dir="asc" label="↑  A → Ö  (stigande)" />
        <SortBtn dir="desc" label="↓  Ö → A  (fallande)" />
      </div>
      <div style={{ padding:'6px 8px 4px' }}>
        <div style={{ fontSize:10, fontWeight:700, color:T.muted, textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:5 }}>Filter</div>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Sök värde..."
          style={{ width:'100%', padding:'5px 8px', border:`1px solid ${T.border}`, borderRadius:6, fontSize:12, outline:'none', fontFamily:'inherit', color:T.text, marginBottom:5 }}
          onFocus={e => e.target.style.borderColor=T.primary} onBlur={e => e.target.style.borderColor=T.border} />
        <div style={{ maxHeight:170, overflowY:'auto', marginRight:-2, paddingRight:2 }}>
          <label style={{ display:'flex', alignItems:'center', gap:7, padding:'4px 4px 5px', borderBottom:`1px solid ${T.border}`, marginBottom:3, cursor:'pointer', fontSize:12, color:T.text, fontWeight:700 }}>
            <input type="checkbox" checked={allChecked} ref={el => { if (el) el.indeterminate = someChecked; }}
              onChange={() => { if (allChecked) setSelected(new Set()); else setSelected(new Set(displayValues)); }}
              style={{ accentColor:T.primary, width:13, height:13, flexShrink:0 }} />
            (Välj alla)
          </label>
          {displayValues.map(v => (
            <label key={v} style={{ display:'flex', alignItems:'center', gap:7, padding:'3px 4px', borderRadius:5, cursor:'pointer', fontSize:12, color:T.text }}
              onMouseEnter={e => e.currentTarget.style.background=T.primaryLight}
              onMouseLeave={e => e.currentTarget.style.background='none'}>
              <input type="checkbox" checked={selected.has(v)} onChange={() => toggleValue(v)} style={{ accentColor:T.primary, width:13, height:13, flexShrink:0 }} />
              <span style={{ overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{v}</span>
            </label>
          ))}
          {displayValues.length === 0 && <div style={{ fontSize:12, color:T.muted, textAlign:'center', padding:'10px 0' }}>Inga matchande värden</div>}
        </div>
      </div>
      <div style={{ padding:'7px 8px 8px', borderTop:`1px solid ${T.border}`, display:'flex', gap:6 }}>
        <button onClick={() => { onSetFilter(colKey, null); onClose(); }}
          style={{ flex:1, padding:'6px 8px', border:`1px solid ${T.border}`, borderRadius:7, background:'#F9FAFB', color:T.muted, fontSize:12, fontWeight:600, cursor:'pointer', fontFamily:'inherit' }}
          onMouseEnter={e => { e.currentTarget.style.background='#F3F4F6'; e.currentTarget.style.color=T.text; }}
          onMouseLeave={e => { e.currentTarget.style.background='#F9FAFB'; e.currentTarget.style.color=T.muted; }}>
          Rensa
        </button>
        <button onClick={applyFilter}
          style={{ flex:2, padding:'6px 8px', border:'none', borderRadius:7, background:T.primary, color:'#fff', fontSize:12, fontWeight:600, cursor:'pointer', fontFamily:'inherit' }}
          onMouseEnter={e => e.currentTarget.style.background=T.primaryDark}
          onMouseLeave={e => e.currentTarget.style.background=T.primary}>
          Använd filter
        </button>
      </div>
    </div>,
    document.body
  );
}

/* ════════════════════════════
   DATA TABLE
════════════════════════════ */
const PAGE_SIZE = 15;

function DataTable({ columns, rows, onRefresh, loading, error, idKey, onSave, editTitle }) {
  const [q, setQ]               = useState('');
  const [sortCol, setSortCol]   = useState(null);
  const [sortDir, setSortDir]   = useState('asc');
  const [page, setPage]         = useState(0);
  const [editRow, setEditRow]   = useState(null);
  const [filters, setFilters]   = useState({});
  const [openFilter, setOpenFilter]     = useState(null);
  const [filterAnchor, setFilterAnchor] = useState(null);

  const columnValues = useMemo(() => {
    const result = {};
    columns.forEach(col => {
      const vals = [...new Set(rows.map(r => { const v = r[col.key]; return (v==null||v==='') ? '(tom)' : String(v); }))].sort((a,b) => a.localeCompare(b,'sv'));
      result[col.key] = vals;
    });
    return result;
  }, [rows, columns]);

  const filtered = useMemo(() => {
    const lq = q.toLowerCase();
    return rows.filter(r => {
      if (lq && !Object.values(r).some(v => String(v).toLowerCase().includes(lq))) return false;
      for (const [colKey, allowed] of Object.entries(filters)) {
        if (!allowed) continue;
        const v = r[colKey]; const sv = (v==null||v==='') ? '(tom)' : String(v);
        if (!allowed.has(sv)) return false;
      }
      return true;
    });
  }, [rows, q, filters]);

  const sorted = useMemo(() => {
    if (!sortCol) return filtered;
    return [...filtered].sort((a,b) => { const av=String(a[sortCol]??''), bv=String(b[sortCol]??''); return sortDir==='asc' ? av.localeCompare(bv,'sv') : bv.localeCompare(av,'sv'); });
  }, [filtered, sortCol, sortDir]);

  const pages  = Math.max(1, Math.ceil(sorted.length / PAGE_SIZE));
  const safePg = Math.min(page, pages - 1);
  const paged  = sorted.slice(safePg * PAGE_SIZE, (safePg + 1) * PAGE_SIZE);

  const handleLabelSort = colKey => { setSortDir(prev => sortCol===colKey?(prev==='asc'?'desc':'asc'):'asc'); setSortCol(colKey); setPage(0); };
  const handlePopoverSort = (colKey, dir) => { setSortCol(colKey); setSortDir(dir); setPage(0); };
  const handleSetFilter   = (colKey, setOrNull) => { setFilters(prev => ({ ...prev, [colKey]: setOrNull })); setPage(0); };
  const clearAllFilters   = () => { setFilters({}); setPage(0); };
  const openFilterPopover = (e, colKey) => {
    e.stopPropagation();
    if (openFilter === colKey) { setOpenFilter(null); setFilterAnchor(null); return; }
    setFilterAnchor(e.currentTarget.getBoundingClientRect()); setOpenFilter(colKey);
  };
  const activeFilterCount = Object.values(filters).filter(v => v!==null).length;
  const TH_BASE = { padding:'0', textAlign:'left', fontSize:11, fontWeight:700, color:T.primaryDark, textTransform:'uppercase', letterSpacing:'0.06em', whiteSpace:'nowrap', background:T.primaryLight, borderBottom:`1px solid ${T.primaryMid}` };

  return (
    <>
      {openFilter && filterAnchor && (
        <FilterPopover colKey={openFilter} colLabel={columns.find(c=>c.key===openFilter)?.label||openFilter}
          allValues={columnValues[openFilter]||[]} currentFilter={filters[openFilter]||null}
          onSort={handlePopoverSort} onSetFilter={handleSetFilter}
          onClose={() => { setOpenFilter(null); setFilterAnchor(null); }} anchor={filterAnchor} />
      )}
      {editRow && (
        <EditModal row={editRow} title={editTitle} onClose={() => setEditRow(null)}
          onSave={async updated => { await onSave(idKey, editRow[idKey], updated); setEditRow(null); }} />
      )}
      <div style={{ display:'flex', gap:10, alignItems:'center', marginBottom:14, flexWrap:'wrap' }}>
        <div style={{ position:'relative', flex:'1 1 200px', maxWidth:280 }}>
          <span style={{ position:'absolute', left:9, top:'50%', transform:'translateY(-50%)', color:T.muted, fontSize:12, pointerEvents:'none' }}>🔍</span>
          <input value={q} onChange={e => { setQ(e.target.value); setPage(0); }} placeholder="Sök i tabellen..."
            style={{ paddingLeft:30, paddingRight:10, paddingTop:8, paddingBottom:8, border:`1px solid ${T.border}`, borderRadius:8, fontSize:13, width:'100%', outline:'none', transition:'border-color 0.15s' }}
            onFocus={e => e.target.style.borderColor=T.primary} onBlur={e => e.target.style.borderColor=T.border} />
        </div>
        <span style={{ fontSize:12, color:T.muted }}>{sorted.length} poster</span>
        {activeFilterCount > 0 && (
          <div style={{ display:'flex', alignItems:'center', gap:6, background:'#FEF3C7', border:'1px solid #FDE68A', borderRadius:8, padding:'4px 10px', fontSize:12, color:'#92400E', fontWeight:600 }}>
            <span>🔽 {activeFilterCount} filter aktiva</span>
            <button onClick={clearAllFilters} style={{ background:'none', border:'none', color:'#92400E', cursor:'pointer', fontWeight:700, fontSize:13, padding:'0 2px', lineHeight:1 }}>×</button>
          </div>
        )}
        {loading && <span className="spin" style={{ width:14, height:14, border:`2px solid ${T.border}`, borderTopColor:T.primary, borderRadius:'50%' }} />}
        {error   && <span style={{ fontSize:12, color:T.danger }}>⚠️ {error}</span>}
        <button onClick={onRefresh}
          style={{ marginLeft:'auto', padding:'7px 14px', background:T.primaryLight, border:`1px solid ${T.primaryMid}`, borderRadius:8, color:T.primaryDark, fontSize:12, fontWeight:600, display:'flex', alignItems:'center', gap:5, transition:'all 0.15s' }}
          onMouseEnter={e => { e.currentTarget.style.background=T.primaryMid; e.currentTarget.style.color='#fff'; }}
          onMouseLeave={e => { e.currentTarget.style.background=T.primaryLight; e.currentTarget.style.color=T.primaryDark; }}>
          ↻ Uppdatera
        </button>
      </div>
      <div style={{ border:`1px solid ${T.border}`, borderRadius:10, overflow:'hidden' }}>
        <div style={{ overflowX:'auto' }}>
          <table style={{ borderCollapse:'collapse', fontSize:13, width:'100%', minWidth:'max-content' }}>
            <thead>
              <tr>
                {columns.map(col => {
                  const isFiltered = !!(filters[col.key]) && filters[col.key] !== null;
                  return (
                    <th key={col.key} style={{ ...TH_BASE }}>
                      <div style={{ display:'flex', alignItems:'center', padding:'9px 10px 9px 14px', gap:4 }}>
                        <span onClick={() => !col.noSort && handleLabelSort(col.key)} style={{ flex:1, cursor:col.noSort?'default':'pointer', userSelect:'none' }}>
                          {col.label}{sortCol===col.key?(sortDir==='asc'?' ↑':' ↓'):''}
                        </span>
                        <button onClick={e => openFilterPopover(e, col.key)}
                          style={{ background:isFiltered?T.primary:'transparent', border:isFiltered?`1px solid ${T.primaryDark}`:'1px solid transparent', borderRadius:5, padding:'1px 4px', cursor:'pointer', color:isFiltered?'#fff':T.primaryDark, fontSize:10, lineHeight:1.4, flexShrink:0, transition:'all 0.12s' }}
                          onMouseEnter={e => { if(!isFiltered){e.currentTarget.style.background=T.primaryMid;e.currentTarget.style.color='#fff';e.currentTarget.style.borderColor=T.primaryMid;} }}
                          onMouseLeave={e => { if(!isFiltered){e.currentTarget.style.background='transparent';e.currentTarget.style.color=T.primaryDark;e.currentTarget.style.borderColor='transparent';} }}>
                          {isFiltered?'🔽':'▾'}
                        </button>
                      </div>
                    </th>
                  );
                })}
                <th className="sticky-edit" style={{ ...TH_BASE, right:0, borderLeft:`2px solid ${T.primaryMid}`, textAlign:'center', width:94, minWidth:94, boxShadow:'-3px 0 8px rgba(0,0,0,0.06)' }}>
                  <div style={{ padding:'9px 10px' }}>Åtgärd</div>
                </th>
              </tr>
            </thead>
            <tbody>
              {paged.length === 0
                ? <tr><td colSpan={columns.length+1} style={{ padding:48, textAlign:'center', color:T.muted }}>Inga poster hittades</td></tr>
                : paged.map((row, i) => {
                    const bg = i%2===0 ? T.white : '#FAFAFA';
                    return (
                      <tr key={row[idKey]??i} style={{ backgroundColor:bg, borderTop:`1px solid ${T.border}` }}
                        onMouseEnter={e => e.currentTarget.style.backgroundColor='#ECFDF5'}
                        onMouseLeave={e => e.currentTarget.style.backgroundColor=bg}>
                        {columns.map(col => (
                          <td key={col.key} style={{ padding:'9px 14px', whiteSpace:'nowrap', maxWidth:col.maxW||260, overflow:'hidden', textOverflow:'ellipsis', color:T.text }}>
                            {col.render ? col.render(row[col.key], row) : (row[col.key]!=null&&row[col.key]!==''?String(row[col.key]):'—')}
                          </td>
                        ))}

════════════════════════════ */
function ShiftCircles({ row }) {
  // Determine how many cleaners there are
  const cleaners = [];
  if (row.cleaner_1 && String(row.cleaner_1).trim() !== '' && String(row.cleaner_1).trim() !== '—') cleaners.push(1);
  if (row.cleaner_2 && String(row.cleaner_2).trim() !== '' && String(row.cleaner_2).trim() !== '—') cleaners.push(2);
  if (row.cleaner_3 && String(row.cleaner_3).trim() !== '' && String(row.cleaner_3).trim() !== '—') cleaners.push(3);
  if (cleaners.length === 0) cleaners.push(1); // show at least 1

  return (
    <div style={{ display:'flex', gap:4, marginTop:4 }}>
      {cleaners.map(n => {
        const stamIn  = row[`shift_start_${n}`];
        const stamOut = row[`shift_end_${n}`];
        const hasIn  = stamIn  && String(stamIn).trim()  !== '' && String(stamIn).trim()  !== '—' && String(stamIn).trim()  !== 'Loading...';
        const hasOut = stamOut && String(stamOut).trim() !== '' && String(stamOut).trim() !== '—' && String(stamOut).trim() !== 'Loading...';
        const emoji = hasOut ? '🟢' : hasIn ? '🟡' : '🔴';
        return <span key={n} style={{ fontSize:14 }} title={`Städare ${n}: ${hasOut?'Utcheckad':hasIn?'Incheckad':'Ej startad'}`}>{emoji}</span>;
      })}
    </div>
  );
}

/* 6. Arbetspass — CARD LAYOUT */
function Shifts() {
  const { data, loading, error, refresh, saveRow }  = useSheetData('shifts', 'shifts');
  const { data: employeeData }                      = useSheetData('employees', 'cleaner');
  const [dateRange, setDateRange]                   = useState(getMonthRange);

  const cleaners = useMemo(() =>
    employeeData
      .filter(e => e.Name && e.Name !== 'Loading...' && e.Email && e.Email !== 'Loading...')
      .map(e => ({ name: e.Name, email: e.Email })),
    [employeeData]
  );

  const today = new Date().toLocaleDateString('sv-SE', { timeZone:'Europe/Stockholm' });

  const filteredData = useMemo(() =>
    data.filter(r => {
      const d = toYMD(r.date);
      if (!d || !dateRange.from || !dateRange.to) return true;
      return d >= dateRange.from && d <= dateRange.to;
    }),
    [data, dateRange]
  );

  return (
    <ViewShell stats={[
      { label:'Schemalagda pass',    value:filteredData.length, emoji:'⏰', color:T.primary },
      { label:'Idag',                value:filteredData.filter(r => toYMD(r.date)===today).length, emoji:'📆', color:T.warning },
      { label:'Bekräftelse skickad', value:filteredData.filter(r => r.Confirmation_sent==='Sent').length, emoji:'✅', color:T.success },
      { label:'Uppföljning kvar',    value:filteredData.filter(r => !r.Followup_sent||r.Followup_sent.toString().trim()==='').length, emoji:'📤', color:T.info },
    ]}>
      <ShiftCardList
        rows={data} loading={loading} error={error}
        onRefresh={refresh} onSave={saveRow}
        cleaners={cleaners}
        dateRange={dateRange} onDateRangeChange={setDateRange}
      />
    </ViewShell>
  );
}
  const today = new Date().toLocaleDateString('sv-SE', { timeZone:'Europe/Stockholm' });
  return (
    <ViewShell stats={[
      { label:'Schemalagda pass',    value:data.length, emoji:'⏰', color:T.primary },
      { label:'Idag',                value:data.filter(r => toYMD(r.date)===today).length, emoji:'📆', color:T.warning },
      { label:'Bekräftelse skickad', value:data.filter(r => r.Confirmation_sent==='Sent').length, emoji:'✅', color:T.success },
      { label:'Uppföljning kvar',    value:data.filter(r => !r.Followup_sent||r.Followup_sent.toString().trim()==='').length, emoji:'📤', color:T.info },
    ]}>
      <ShiftCardList
        rows={data} loading={loading} error={error}
        onRefresh={refresh} onSave={saveRow}
        cleaners={cleaners}
        dateRange={dateRange} onDateRangeChange={setDateRange}
      />
    </ViewShell>
  );
}

/* ════════════════════════════
   LOGIN
════════════════════════════ */
function LoginPage({ onLogin }) {
  const [loading, setLoading] = useState(false);
  const [error, setError]     = useState('');
  const btnRef = useRef(null);
  useEffect(() => {
    if (!window.google?.accounts?.id) return;
    window.google.accounts.id.initialize({
      client_id: CONFIG.GOOGLE_CLIENT_ID,
      hosted_domain: CONFIG.ALLOWED_DOMAIN,
      callback: (resp) => {
        try {
          const pl = JSON.parse(atob(resp.credential.split('.')[1]));
          if (!pl.email.endsWith('@' + CONFIG.ALLOWED_DOMAIN)) { setError('Åtkomst nekad. Endast @' + CONFIG.ALLOWED_DOMAIN + '-konton tillåts.'); return; }
          onLogin({ name:pl.name, email:pl.email, avatar:(pl.name||'?').split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase() });
        } catch { setError('Inloggning misslyckades.'); }
      }
    });
    if (btnRef.current) window.google.accounts.id.renderButton(btnRef.current, { theme:'outline', size:'large', width:340, locale:'sv' });
  }, []);
  const demoLogin = () => { setLoading(true); setTimeout(() => onLogin({ name:'Admin Behjärta', email:'admin@behjarta.com', avatar:'AB' }), 900); };
  return (
    <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:'linear-gradient(140deg,#003D35 0%,#00695C 40%,#009688 70%,#26A69A 100%)', position:'relative', overflow:'hidden' }}>
      {[350,550,750].map((s,i) => <div key={i} style={{ position:'absolute', width:s, height:s, borderRadius:'50%', border:'1px solid rgba(255,255,255,0.05)', top:'50%', left:'50%', transform:`translate(-${30+i*10}%,-${50+i*5}%)`, pointerEvents:'none' }} />)}
      <div style={{ background:T.white, borderRadius:20, padding:'44px 40px', width:'100%', maxWidth:420, boxShadow:'0 30px 80px rgba(0,0,0,0.35)', textAlign:'center', position:'relative', zIndex:1 }}>
        <img src="https://behjarta.com/g22.png" alt="Behjärta" style={{ height:42, marginBottom:8 }} onError={e => e.target.style.display='none'} />
        <div style={{ fontSize:10, color:T.muted, letterSpacing:'0.18em', textTransform:'uppercase', fontWeight:700, marginBottom:28 }}>Administrationsportal</div>
        <h1 style={{ fontSize:22, fontWeight:700, color:T.text, marginBottom:8 }}>Välkommen tillbaka</h1>
        <p style={{ fontSize:13, color:T.muted, marginBottom:28, lineHeight:1.65 }}>Logga in med ditt <strong style={{ color:T.primaryDark }}>@behjarta.com</strong>-konto.</p>
        {error && <div style={{ background:'#FEF2F2', border:'1px solid #FECACA', color:T.danger, padding:'10px 14px', borderRadius:10, fontSize:13, marginBottom:18, textAlign:'left' }}>⚠️ {error}</div>}
        <div ref={btnRef} style={{ display:'flex', justifyContent:'center', marginBottom:10 }} />
        {CONFIG.DEMO_MODE && (
          <button onClick={demoLogin} disabled={loading}
            style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:10, width:'100%', padding:'12px', background:T.white, border:`1.5px dashed ${T.primaryMid}`, borderRadius:10, cursor:loading?'not-allowed':'pointer', fontSize:13, fontWeight:600, color:T.primaryDark, fontFamily:'inherit', transition:'all 0.15s', opacity:loading?0.7:1 }}
            onMouseEnter={e=>{ if(!loading) e.currentTarget.style.background=T.primaryLight; }}
            onMouseLeave={e=>{ if(!loading) e.currentTarget.style.background=T.white; }}>
            {loading ? <><span className="spin" style={{ width:14,height:14,border:`2px solid ${T.border}`,borderTopColor:T.primary,borderRadius:'50%'}}/>Loggar in...</> : '🧪 Demo-inloggning'}
          </button>
        )}
        <div style={{ marginTop:22, padding:'11px', background:'#F8FAFC', borderRadius:10, fontSize:11, color:T.muted }}>
          🔒 Åtkomst begränsad till <strong>@{CONFIG.ALLOWED_DOMAIN}</strong>
        </div>
      </div>
    </div>
  );
}
