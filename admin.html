/* ════════════════════════════
   API HELPERS  — JSONP (bypasses Apps Script CORS)
════════════════════════════ */

// Generic JSONP caller — injects a <script> tag, waits for callback
function jsonp(url, params = {}, timeoutMs = 12000) {
  return new Promise((resolve, reject) => {
    const cbName = '__bh_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const qs = new URLSearchParams({ ...params, callback: cbName }).toString();
    const script = document.createElement('script');
    const timer = setTimeout(() => {
      cleanup();
      reject(new Error('Timeout — kontrollera att Apps Script är deployat och att URL är korrekt.'));
    }, timeoutMs);

    function cleanup() {
      clearTimeout(timer);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    window[cbName] = (data) => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('Nätverksfel — kunde inte nå Apps Script. Kontrollera URL i CONFIG.')); };
    script.src = `${url}?${qs}`;
    document.head.appendChild(script);
  });
}

async function fetchSheet(sheetName) {
  const res = await jsonp(CONFIG.APPS_SCRIPT_URL, { sheet: sheetName });
  if (!res.success) throw new Error(res.error || 'Okänt fel från Apps Script');
  return res.data;
}

// For updates we also use JSONP (GET with action=update + data as JSON in URL param)
// The Apps Script doGet must handle action=update too (see companion script below)
async function updateSheetRow(sheetName, idKey, idValue, updatedRow) {
  const res = await jsonp(CONFIG.APPS_SCRIPT_URL, {
    action: 'update',
    sheet: sheetName,
    idKey,
    idValue: String(idValue),
    row: JSON.stringify(updatedRow),
  });
  if (!res.success) throw new Error(res.error || 'Uppdatering misslyckades');
}

function useSheetData(mockKey, sheetName) {
  const [data, setData] = useState(MOCK[mockKey] || []);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  const refresh = useCallback(async () => {
    if (CONFIG.DEMO_MODE) { setData([...(MOCK[mockKey] || [])]); return; }
    setLoading(true); setError(null);
    try { setData(await fetchSheet(sheetName)); }
    catch(e) { setError(e.message); }
    setLoading(false);
  }, [mockKey, sheetName]);

  useEffect(() => { refresh(); }, []);

  const saveRow = useCallback(async (idKey, idValue, updatedRow) => {
    if (CONFIG.DEMO_MODE) {
      setData(prev => prev.map(r => String(r[idKey]) === String(idValue) ? { ...r, ...updatedRow } : r));
      return;
    }
    await updateSheetRow(sheetName, idKey, idValue, updatedRow);
    await refresh();
  }, [sheetName, refresh]);

  return { data, loading, error, refresh, saveRow };
}

════════════════════════════ */
const LONG_FIELDS   = new Set(['Message','Comments','Instructions','WKT','lanlot']);
const READONLY_FIELDS = new Set(['created_at']);

function EditModal({ row, title, onClose, onSave }) {
  const [form, setForm] = useState({ ...row });
  const [saving, setSaving] = useState(false);
  const [err, setErr] = useState('');
  const keys = Object.keys(row);

  const handleSave = async () => {
    setSaving(true); setErr('');
    try { await onSave(form); onClose(); }
    catch(e) { setErr(e.message); setSaving(false); }
  };

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-box">
        <div style={{ padding: '18px 24px 15px', borderBottom: `1px solid ${T.border}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0 }}>
          <div>
            <div style={{ fontSize: 15, fontWeight: 700, color: T.text }}>Redigera rad</div>
            <div style={{ fontSize: 11, color: T.muted, marginTop: 2 }}>{title}</div>
          </div>
          <button onClick={onClose} style={{ border: 'none', background: 'none', fontSize: 22, color: T.muted, padding: '0 4px', lineHeight: 1 }}>×</button>
        </div>

        <div className="modal-body">
          {err && <div style={{ background: '#FEF2F2', border: '1px solid #FECACA', color: T.danger, padding: '8px 12px', borderRadius: 8, fontSize: 13, marginBottom: 14 }}>⚠️ {err}</div>}
          <div className="field-grid">
            {keys.map(k => {
              const isLong = LONG_FIELDS.has(k);
              const isRO   = READONLY_FIELDS.has(k);
              return (
                <div key={k} className={`field-group${isLong ? ' field-full' : ''}${isRO ? ' field-readonly' : ''}`}>
                  <label>{k.replace(/_/g, ' ')}</label>
                  {isLong
                    ? <textarea value={form[k] ?? ''} readOnly={isRO} onChange={e => set(k, e.target.value)} />
                    : <input type="text" value={form[k] ?? ''} readOnly={isRO} onChange={e => set(k, e.target.value)} />
                  }
                </div>
              );
            })}
          </div>
        </div>

        <div style={{ padding: '14px 24px', borderTop: `1px solid ${T.border}`, display: 'flex', gap: 10, justifyContent: 'flex-end', flexShrink: 0 }}>
          <button onClick={onClose}
            style={{ padding: '9px 20px', border: `1px solid ${T.border}`, borderRadius: 8, background: T.white, color: T.muted, fontSize: 13, fontWeight: 600 }}>
            Avbryt
          </button>
          <button onClick={handleSave} disabled={saving}
            style={{ padding: '9px 22px', border: 'none', borderRadius: 8, background: T.primary, color: '#fff', fontSize: 13, fontWeight: 600, display: 'flex', alignItems: 'center', gap: 8, opacity: saving ? 0.75 : 1 }}>
            {saving
              ? <><span className="spin" style={{ width: 13, height: 13, border: '2px solid rgba(255,255,255,0.3)', borderTopColor: '#fff', borderRadius: '50%' }} />Sparar...</>
              : '💾 Spara ändringar'
            }
          </button>
        </div>
      </div>
    </div>

/* ════════════════════════════
   DATA TABLE
════════════════════════════ */
const PAGE_SIZE = 15;

function DataTable({ columns, rows, onRefresh, loading, error, idKey, onSave, editTitle }) {
  const [q, setQ]           = useState('');
  const [sortCol, setSortCol] = useState(null);
  const [sortDir, setSortDir] = useState('asc');
  const [page, setPage]     = useState(0);
  const [editRow, setEditRow] = useState(null);

  const filtered = useMemo(() => {
    const lq = q.toLowerCase();
    return rows.filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(lq)));
  }, [rows, q]);

  const sorted = useMemo(() => {
    if (!sortCol) return filtered;
    return [...filtered].sort((a, b) => {
      const av = String(a[sortCol] ?? ''), bv = String(b[sortCol] ?? '');
      return sortDir === 'asc' ? av.localeCompare(bv, 'sv') : bv.localeCompare(av, 'sv');
    });
  }, [filtered, sortCol, sortDir]);

  const pages   = Math.max(1, Math.ceil(sorted.length / PAGE_SIZE));
  const safePg  = Math.min(page, pages - 1);
  const paged   = sorted.slice(safePg * PAGE_SIZE, (safePg + 1) * PAGE_SIZE);

  const handleSort = k => {
    setSortCol(prev => { setSortDir(prev === k ? (sortDir === 'asc' ? 'desc' : 'asc') : 'asc'); return k; });
    setPage(0);
  };

  const TH_BASE = {
    padding: '10px 14px', textAlign: 'left', fontSize: 11, fontWeight: 700,
    color: T.primaryDark, textTransform: 'uppercase', letterSpacing: '0.06em',
    whiteSpace: 'nowrap', background: T.primaryLight,
  };

  return (
    <>
      {editRow && (
        <EditModal
          row={editRow} title={editTitle}
          onClose={() => setEditRow(null)}
          onSave={async updated => { await onSave(idKey, editRow[idKey], updated); setEditRow(null); }}
        />
      )}

      {/* Toolbar */}
      <div style={{ display: 'flex', gap: 10, alignItems: 'center', marginBottom: 14, flexWrap: 'wrap' }}>
        <div style={{ position: 'relative', flex: '1 1 200px', maxWidth: 280 }}>
          <span style={{ position: 'absolute', left: 9, top: '50%', transform: 'translateY(-50%)', color: T.muted, fontSize: 12, pointerEvents: 'none' }}>🔍</span>
          <input value={q} onChange={e => { setQ(e.target.value); setPage(0); }} placeholder="Sök i tabellen..."
            style={{ paddingLeft: 30, paddingRight: 10, paddingTop: 8, paddingBottom: 8, border: `1px solid ${T.border}`, borderRadius: 8, fontSize: 13, width: '100%', outline: 'none', transition: 'border-color 0.15s' }}
            onFocus={e => e.target.style.borderColor = T.primary}
            onBlur={e => e.target.style.borderColor = T.border} />
        </div>

        <span style={{ fontSize: 12, color: T.muted }}>{sorted.length} poster</span>

        {loading && <span className="spin" style={{ width: 14, height: 14, border: `2px solid ${T.border}`, borderTopColor: T.primary, borderRadius: '50%' }} />}
        {error   && <span style={{ fontSize: 12, color: T.danger }}>⚠️ {error}</span>}

        <button onClick={onRefresh}
          style={{ marginLeft: 'auto', padding: '7px 14px', background: T.primaryLight, border: `1px solid ${T.primaryMid}`, borderRadius: 8, color: T.primaryDark, fontSize: 12, fontWeight: 600, display: 'flex', alignItems: 'center', gap: 5, transition: 'all 0.15s' }}
          onMouseEnter={e => { e.currentTarget.style.background = T.primaryMid; e.currentTarget.style.color = '#fff'; }}
          onMouseLeave={e => { e.currentTarget.style.background = T.primaryLight; e.currentTarget.style.color = T.primaryDark; }}>
          ↻ Uppdatera
        </button>
      </div>

      {/* Table */}
      <div style={{ border: `1px solid ${T.border}`, borderRadius: 10, overflow: 'hidden' }}>
        <div style={{ overflowX: 'auto' }}>
          <table style={{ borderCollapse: 'collapse', fontSize: 13, width: '100%', minWidth: 'max-content' }}>
            <thead>
              <tr>
                {columns.map(col => (
                  <th key={col.key} onClick={() => !col.noSort && handleSort(col.key)}
                    style={{ ...TH_BASE, cursor: col.noSort ? 'default' : 'pointer', userSelect: 'none' }}>
                    {col.label}{sortCol === col.key ? (sortDir === 'asc' ? ' ↑' : ' ↓') : ''}
                  </th>
                ))}
                {/* Sticky Edit header */}
                <th className="sticky-edit" style={{ ...TH_BASE, right: 0, borderLeft: `2px solid ${T.primaryMid}`, textAlign: 'center', width: 94, minWidth: 94, boxShadow: '-3px 0 8px rgba(0,0,0,0.06)' }}>
                  Åtgärd
                </th>
              </tr>
            </thead>
            <tbody>
              {paged.length === 0
                ? <tr><td colSpan={columns.length + 1} style={{ padding: 48, textAlign: 'center', color: T.muted }}>Inga poster hittades</td></tr>
                : paged.map((row, i) => {
                    const bg = i % 2 === 0 ? T.white : '#FAFAFA';
                    return (
                      <tr key={row[idKey] ?? i} style={{ backgroundColor: bg, borderTop: `1px solid ${T.border}` }}
                        onMouseEnter={e => e.currentTarget.style.backgroundColor = '#ECFDF5'}
                        onMouseLeave={e => e.currentTarget.style.backgroundColor = bg}>
                        {columns.map(col => (
                          <td key={col.key} style={{ padding: '9px 14px', whiteSpace: 'nowrap', maxWidth: col.maxW || 260, overflow: 'hidden', textOverflow: 'ellipsis', color: T.text }}>
                            {col.render ? col.render(row[col.key], row) : (row[col.key] != null && row[col.key] !== '' ? String(row[col.key]) : '—')}
                          </td>
                        ))}
                        {/* Sticky Edit cell — bg must match row */}
                        <td className="sticky-edit" style={{ right: 0, backgroundColor: bg, borderLeft: `2px solid ${T.border}`, padding: '7px 10px', textAlign: 'center', width: 94, minWidth: 94, boxShadow: '-3px 0 8px rgba(0,0,0,0.05)' }}
                          onMouseEnter={e => e.currentTarget.style.backgroundColor = '#ECFDF5'}
                          onMouseLeave={e => e.currentTarget.style.backgroundColor = bg}>
                          <button onClick={() => setEditRow(row)}
                            style={{ padding: '5px 11px', background: T.primaryLight, border: `1px solid ${T.primaryMid}`, borderRadius: 7, color: T.primaryDark, fontSize: 12, fontWeight: 600, whiteSpace: 'nowrap', transition: 'all 0.13s' }}
                            onMouseEnter={e => { e.currentTarget.style.background = T.primary; e.currentTarget.style.color = '#fff'; e.currentTarget.style.borderColor = T.primary; }}
                            onMouseLeave={e => { e.currentTarget.style.background = T.primaryLight; e.currentTarget.style.color = T.primaryDark; e.currentTarget.style.borderColor = T.primaryMid; }}>
                            ✎ Redigera
                          </button>
                        </td>
                      </tr>
                    );
                  })
              }
            </tbody>
          </table>
        </div>
      </div>

      {/* Pagination */}
      {pages > 1 && (
        <div style={{ display: 'flex', gap: 5, marginTop: 12, justifyContent: 'flex-end', alignItems: 'center' }}>
          <button onClick={() => setPage(p => Math.max(0, p - 1))} disabled={safePg === 0}
            style={{ padding: '5px 10px', border: `1px solid ${T.border}`, borderRadius: 6, background: T.white, color: safePg === 0 ? T.muted : T.text, fontSize: 13 }}>‹</button>
          {Array.from({ length: Math.min(pages, 8) }, (_, i) => (
            <button key={i} onClick={() => setPage(i)}
              style={{ width: 30, height: 30, borderRadius: 6, border: `1px solid ${i === safePg ? T.primary : T.border}`, background: i === safePg ? T.primary : T.white, color: i === safePg ? '#fff' : T.text, fontSize: 12, fontWeight: i === safePg ? 700 : 400 }}>
              {i + 1}
            </button>
          ))}
          <button onClick={() => setPage(p => Math.min(pages - 1, p + 1))} disabled={safePg === pages - 1}
            style={{ padding: '5px 10px', border: `1px solid ${T.border}`, borderRadius: 6, background: T.white, color: safePg === pages - 1 ? T.muted : T.text, fontSize: 13 }}>›</button>
        </div>
      )}
    </>
  );
}

/* ════════════════════════════
   STAT CARD + SHELL
════════════════════════════ */
function StatCard({ label, value, sub, color, emoji }) {
  return (
    <div style={{ background: T.white, borderRadius: 12, padding: '14px 16px', border: `1px solid ${T.border}`, borderLeft: `4px solid ${color}` }}>
      <div style={{ fontSize: 16, marginBottom: 5 }}>{emoji}</div>
      <div style={{ fontSize: 20, fontWeight: 700, color: T.text }}>{value}</div>
      <div style={{ fontSize: 10, fontWeight: 700, color: T.muted, textTransform: 'uppercase', letterSpacing: '0.07em', marginTop: 3 }}>{label}</div>
      {sub && <div style={{ fontSize: 11, color, fontWeight: 600, marginTop: 2 }}>{sub}</div>}
    </div>
  );
}
function ViewShell({ stats, children }) {
  return (
    <div className="fade-in">
      {stats && (
        <div style={{ display: 'grid', gridTemplateColumns: `repeat(${stats.length}, minmax(0,1fr))`, gap: 12, marginBottom: 20 }}>
          {stats.map((s, i) => <StatCard key={i} {...s} />)}
        </div>
      )}
      {children}
    </div>
  );
}

  { id: 'tickets',    label: 'Obesvarade ärenden', emoji: '🎫', title: 'Obesvarade ärenden', subtitle: 'Kontaktformulär — contact-data', Component: Tickets, getBadge: d => (d||MOCK.tickets).filter(r=>!r.Answered||r.Answered==='Nej').length, badgeColor: T.danger },
  { id: 'booked-data', label: 'Bokningar',    emoji: '📅', title: 'Bokningar',  subtitle: 'Alla bokningar — booking_data', Component: BookedData },
  { id: 'customers',  label: 'Kunder',        emoji: '👥', title: 'Kunder',     subtitle: 'Kundregister — customer_data', Component: Customers },
  { id: 'employees',  label: 'Personal',      emoji: '🧹', title: 'Personal',   subtitle: 'Städpersonal — cleaner', Component: Employees },
  { id: 'shifts',     label: 'Arbetspass',    emoji: '⏰', title: 'Arbetspass', subtitle: 'Schema — shifts', Component: Shifts },
];

/* ════════════════════════════
   SIDEBAR
════════════════════════════ */
function Sidebar({ active, setActive, user, onLogout }) {
  return (
    <div style={{ width: 236, minWidth: 236, background: T.sidebar, display: 'flex', flexDirection: 'column', height: '100vh', position: 'sticky', top: 0, zIndex: 20 }}>
      <div style={{ padding: '20px 18px 16px', borderBottom: '1px solid rgba(255,255,255,0.06)' }}>
        <img src="https://behjarta.com/g22.png" alt="Behjärta" style={{ height: 30, filter: 'brightness(0) invert(1)', display: 'block' }}
          onError={e => { e.target.style.display='none'; }} />
        <div style={{ fontSize: 10, color: 'rgba(255,255,255,0.27)', letterSpacing: '0.18em', textTransform: 'uppercase', fontWeight: 700, marginTop: 6 }}>Admin Portal</div>
      </div>
      {CONFIG.DEMO_MODE && (
        <div style={{ margin: '10px 12px 0', padding: '6px 10px', background: 'rgba(251,191,36,0.1)', border: '1px solid rgba(251,191,36,0.2)', borderRadius: 7, fontSize: 11, color: '#FCD34D', fontWeight: 600 }}>
          ⚠️ Demo-läge aktiv
        </div>
      )}
      <nav style={{ flex: 1, paddingTop: 8, overflowY: 'auto' }}>
        {NAV.map(item => {
          const isActive = active === item.id;
          const badge = item.getBadge?.();
          return (
            <button key={item.id} onClick={() => setActive(item.id)}
              style={{ display: 'flex', alignItems: 'center', gap: 9, width: '100%', padding: '10px 18px', background: isActive ? 'rgba(0,150,136,0.18)' : 'transparent', border: 'none', borderLeft: `3px solid ${isActive ? T.primary : 'transparent'}`, color: isActive ? '#fff' : 'rgba(255,255,255,0.44)', fontSize: 13, fontWeight: isActive ? 600 : 400, textAlign: 'left', fontFamily: 'inherit', transition: 'all 0.13s', cursor: 'pointer' }}
              onMouseEnter={e => { if (!isActive) { e.currentTarget.style.background='rgba(255,255,255,0.04)'; e.currentTarget.style.color='rgba(255,255,255,0.72)'; } }}
              onMouseLeave={e => { if (!isActive) { e.currentTarget.style.background='transparent'; e.currentTarget.style.color='rgba(255,255,255,0.44)'; } }}>
              <span style={{ fontSize: 14, flexShrink: 0 }}>{item.emoji}</span>
              <span style={{ flex: 1 }}>{item.label}</span>
              {badge > 0 && <span style={{ background: item.badgeColor, color: '#fff', borderRadius: 999, padding: '1px 7px', fontSize: 10, fontWeight: 800 }}>{badge}</span>}
            </button>
          );
        })}
      </nav>
      <div style={{ padding: '12px 14px', borderTop: '1px solid rgba(255,255,255,0.06)' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 9, marginBottom: 10, overflow: 'hidden' }}>
          <div style={{ width: 33, height: 33, borderRadius: '50%', background: T.primary, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 12, fontWeight: 700, color: '#fff', flexShrink: 0 }}>{user?.avatar}</div>
          <div style={{ overflow: 'hidden' }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: 'rgba(255,255,255,0.88)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{user?.name}</div>
            <div style={{ fontSize: 10, color: 'rgba(255,255,255,0.3)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{user?.email}</div>
          </div>
        </div>
        <button onClick={onLogout}
          style={{ width: '100%', padding: '7px', background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.07)', borderRadius: 8, color: 'rgba(255,255,255,0.38)', fontSize: 12, fontFamily: 'inherit', transition: 'all 0.14s' }}
          onMouseEnter={e => { e.currentTarget.style.background='rgba(255,255,255,0.1)'; e.currentTarget.style.color='#fff'; }}
          onMouseLeave={e => { e.currentTarget.style.background='rgba(255,255,255,0.05)'; e.currentTarget.style.color='rgba(255,255,255,0.38)'; }}>
          Logga ut
        </button>
      </div>
    </div>
  );
}

/* ════════════════════════════
   LOGIN
════════════════════════════ */
function LoginPage({ onLogin }) {
  const [loading, setLoading] = useState(false);
  const [error, setError]     = useState('');
  const btnRef = useRef(null);

  useEffect(() => {
    if (!window.google?.accounts?.id) return;
    window.google.accounts.id.initialize({
      client_id: CONFIG.GOOGLE_CLIENT_ID,
      hosted_domain: CONFIG.ALLOWED_DOMAIN,
      callback: (resp) => {
        try {
          const pl = JSON.parse(atob(resp.credential.split('.')[1]));
          if (!pl.email.endsWith('@' + CONFIG.ALLOWED_DOMAIN)) { setError('Åtkomst nekad. Endast @' + CONFIG.ALLOWED_DOMAIN + '-konton tillåts.'); return; }
          onLogin({ name: pl.name, email: pl.email, avatar: (pl.name||'?').split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase() });
        } catch { setError('Inloggning misslyckades.'); }
      }
    });
    if (btnRef.current) window.google.accounts.id.renderButton(btnRef.current, { theme: 'outline', size: 'large', width: 340, locale: 'sv' });
  }, []);

  const demoLogin = () => { setLoading(true); setTimeout(() => onLogin({ name: 'Admin Behjärta', email: 'admin@behjarta.com', avatar: 'AB' }), 900); };

  return (
    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'linear-gradient(140deg, #003D35 0%, #00695C 40%, #009688 70%, #26A69A 100%)', position: 'relative', overflow: 'hidden' }}>
      {[350,550,750].map((s,i) => <div key={i} style={{ position:'absolute', width:s, height:s, borderRadius:'50%', border:'1px solid rgba(255,255,255,0.05)', top:'50%', left:'50%', transform:`translate(-${30+i*10}%,-${50+i*5}%)`, pointerEvents:'none' }} />)}
      <div style={{ background: T.white, borderRadius: 20, padding: '44px 40px', width: '100%', maxWidth: 420, boxShadow: '0 30px 80px rgba(0,0,0,0.35)', textAlign: 'center', position: 'relative', zIndex: 1 }}>
        <img src="https://behjarta.com/g22.png" alt="Behjärta" style={{ height: 42, marginBottom: 8 }} onError={e => e.target.style.display='none'} />
        <div style={{ fontSize: 10, color: T.muted, letterSpacing: '0.18em', textTransform: 'uppercase', fontWeight: 700, marginBottom: 28 }}>Administrationsportal</div>
        <h1 style={{ fontSize: 22, fontWeight: 700, color: T.text, marginBottom: 8 }}>Välkommen tillbaka</h1>
        <p style={{ fontSize: 13, color: T.muted, marginBottom: 28, lineHeight: 1.65 }}>
          Logga in med ditt <strong style={{ color: T.primaryDark }}>@behjarta.com</strong>-konto.
        </p>
        {error && <div style={{ background: '#FEF2F2', border: '1px solid #FECACA', color: T.danger, padding: '10px 14px', borderRadius: 10, fontSize: 13, marginBottom: 18, textAlign: 'left' }}>⚠️ {error}</div>}
        <div ref={btnRef} style={{ display: 'flex', justifyContent: 'center', marginBottom: 10 }} />
        {CONFIG.DEMO_MODE && (
          <button onClick={demoLogin} disabled={loading}
            style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:10, width:'100%', padding:'12px', background:T.white, border:`1.5px dashed ${T.primaryMid}`, borderRadius:10, cursor:loading?'not-allowed':'pointer', fontSize:13, fontWeight:600, color:T.primaryDark, fontFamily:'inherit', transition:'all 0.15s', opacity:loading?0.7:1 }}
            onMouseEnter={e=>{ if(!loading) e.currentTarget.style.background=T.primaryLight; }}
            onMouseLeave={e=>{ if(!loading) e.currentTarget.style.background=T.white; }}>
            {loading ? <><span className="spin" style={{width:14,height:14,border:`2px solid ${T.border}`,borderTopColor:T.primary,borderRadius:'50%'}}/>Loggar in...</> : '🧪 Demo-inloggning'}
          </button>
        )}
        <div style={{ marginTop: 22, padding: '11px', background: '#F8FAFC', borderRadius: 10, fontSize: 11, color: T.muted }}>
          🔒 Åtkomst begränsad till <strong>@{CONFIG.ALLOWED_DOMAIN}</strong>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════
   APP
════════════════════════════ */
function App() {
  const [user, setUser]   = useState(null);
  const [active, setActive] = useState('booking-requests');
  const activeNav = NAV.find(n => n.id === active);
  const { Component } = activeNav;
  if (!user) return <LoginPage onLogin={setUser} />;
  return (
    <div style={{ display: 'flex', height: '100vh' }}>
      <Sidebar active={active} setActive={setActive} user={user} onLogout={() => setUser(null)} />
      <main style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        <div style={{ background: T.white, borderBottom: `1px solid ${T.border}`, padding: '13px 26px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0 }}>
          <div>
            <h1 style={{ fontSize: 16, fontWeight: 700, color: T.text, margin: 0 }}>{activeNav.title}</h1>
            <p style={{ fontSize: 11, color: T.muted, marginTop: 1 }}>{activeNav.subtitle}</p>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            <span style={{ fontSize: 11, color: T.muted }}>{new Date().toLocaleDateString('sv-SE', { weekday:'long', day:'numeric', month:'long', year:'numeric' })}</span>
            <div style={{ width: 32, height: 32, borderRadius: '50%', background: T.primaryLight, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 700, color: T.primaryDark, border: `2px solid ${T.primary}` }}>{user.avatar}</div>
          </div>
        </div>
        <div style={{ flex: 1, overflowY: 'auto', padding: 24, background: T.bg }}>
          <div style={{ background: T.white, borderRadius: 14, padding: '20px 22px', border: `1px solid ${T.border}`, minHeight: 300 }}>
            <Component />
          </div>
          <div style={{ textAlign: 'center', marginTop: 16, fontSize: 11, color: T.muted }}>
            Behjärta Admin Platform © {new Date().getFullYear()} — MS Secure Solutions AB (559189-2806)
          </div>
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
