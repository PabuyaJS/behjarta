/* ════════════════════════════════════════════════
   📋  DATA TABLE  (search + sort + pagination)
════════════════════════════════════════════════ */
const PAGE_SIZE = 10;
function DataTable({ columns, rows, onRefresh }) {
  const [q, setQ] = useState('');
  const [sortCol, setSortCol] = useState(null);
  const [sortDir, setSortDir] = useState('asc');
  const [page, setPage] = useState(0);

  const filtered = useMemo(() => {
    const lq = q.toLowerCase();
    return rows.filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(lq)));
  }, [rows, q]);

  const sorted = useMemo(() => {
    if (!sortCol) return filtered;
    return [...filtered].sort((a, b) => {
      const av = String(a[sortCol] ?? ''), bv = String(b[sortCol] ?? '');
      return sortDir === 'asc' ? av.localeCompare(bv, 'sv') : bv.localeCompare(av, 'sv');
    });
  }, [filtered, sortCol, sortDir]);

  const pages = Math.ceil(sorted.length / PAGE_SIZE);
  const paged = sorted.slice(page * PAGE_SIZE, (page + 1) * PAGE_SIZE);

  const handleSort = key => {
    if (sortCol === key) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortCol(key); setSortDir('asc'); }
    setPage(0);
  };

  return (
    <div>
      <div style={{ display: 'flex', gap: 10, alignItems: 'center', marginBottom: 14, flexWrap: 'wrap' }}>
        <div style={{ position: 'relative', flex: '1 1 240px', maxWidth: 300 }}>
          <span style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)', color: T.muted, pointerEvents: 'none' }}>🔍</span>
          <input value={q} onChange={e => { setQ(e.target.value); setPage(0); }} placeholder="Sök i tabellen..."
            style={{ paddingLeft: 34, paddingRight: 12, paddingTop: 8, paddingBottom: 8, border: `1px solid ${T.border}`, borderRadius: 8, fontSize: 13, width: '100%', outline: 'none', transition: 'border-color 0.15s' }}
            onFocus={e => e.target.style.borderColor = T.primary}
            onBlur={e => e.target.style.borderColor = T.border} />
        </div>
        <span style={{ fontSize: 12, color: T.muted }}>{sorted.length} poster</span>
        <button onClick={onRefresh}
          style={{ marginLeft: 'auto', padding: '7px 14px', background: T.primaryLight, border: `1px solid ${T.primaryMid}`, borderRadius: 8, color: T.primaryDark, fontSize: 12, fontWeight: 600, display: 'flex', alignItems: 'center', gap: 6, transition: 'all 0.15s' }}
          onMouseEnter={e => { e.currentTarget.style.background = T.primaryMid; e.currentTarget.style.color = '#fff'; }}
          onMouseLeave={e => { e.currentTarget.style.background = T.primaryLight; e.currentTarget.style.color = T.primaryDark; }}>
          ↻ Uppdatera från Sheets
        </button>
      </div>

      <div style={{ overflowX: 'auto', border: `1px solid ${T.border}`, borderRadius: 10 }}>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
          <thead>
            <tr style={{ background: T.primaryLight }}>
              {columns.map(col => (
                <th key={col.key} onClick={() => !col.noSort && handleSort(col.key)}
                  style={{ padding: '10px 14px', textAlign: 'left', fontSize: 11, fontWeight: 700, color: T.primaryDark, textTransform: 'uppercase', letterSpacing: '0.06em', whiteSpace: 'nowrap', cursor: col.noSort ? 'default' : 'pointer', userSelect: 'none' }}>
                  {col.label}{sortCol === col.key ? (sortDir === 'asc' ? ' ↑' : ' ↓') : ''}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {paged.length === 0
              ? <tr><td colSpan={columns.length} style={{ padding: 48, textAlign: 'center', color: T.muted, fontSize: 14 }}>Inga poster hittades</td></tr>
              : paged.map((row, i) => (
                <tr key={row.id || i}
                  style={{ backgroundColor: i % 2 === 0 ? T.white : '#FAFAFA', borderTop: `1px solid ${T.border}`, transition: 'background 0.12s' }}
                  onMouseEnter={e => e.currentTarget.style.backgroundColor = '#F0FDFA'}
                  onMouseLeave={e => e.currentTarget.style.backgroundColor = i % 2 === 0 ? T.white : '#FAFAFA'}>
                  {columns.map(col => (
                    <td key={col.key} style={{ padding: '10px 14px', whiteSpace: col.wrap ? 'normal' : 'nowrap', maxWidth: col.maxW || 'none', overflow: 'hidden', textOverflow: 'ellipsis', color: T.text }}>
                      {col.render ? col.render(row[col.key], row) : (row[col.key] ?? '—')}
                    </td>
                  ))}
                </tr>
              ))
            }
          </tbody>
        </table>
      </div>

      {pages > 1 && (
        <div style={{ display: 'flex', gap: 5, marginTop: 12, justifyContent: 'flex-end', alignItems: 'center' }}>
          <button onClick={() => setPage(p => Math.max(0, p - 1))} disabled={page === 0}
            style={{ padding: '5px 10px', border: `1px solid ${T.border}`, borderRadius: 6, background: T.white, color: page === 0 ? T.muted : T.text, fontSize: 13 }}>‹</button>
          {Array.from({ length: pages }, (_, i) => (
            <button key={i} onClick={() => setPage(i)}
              style={{ width: 32, height: 32, borderRadius: 6, border: `1px solid ${i === page ? T.primary : T.border}`, background: i === page ? T.primary : T.white, color: i === page ? '#fff' : T.text, fontSize: 13, fontWeight: i === page ? 700 : 400 }}>
              {i + 1}
            </button>
          ))}
          <button onClick={() => setPage(p => Math.min(pages - 1, p + 1))} disabled={page === pages - 1}
            style={{ padding: '5px 10px', border: `1px solid ${T.border}`, borderRadius: 6, background: T.white, color: page === pages - 1 ? T.muted : T.text, fontSize: 13 }}>›</button>
        </div>
      )}
    </div>
  );
}

function ViewShell({ stats, children }) {
  return (
    <div className="fade-in">
      <div style={{ display: 'grid', gridTemplateColumns: `repeat(${stats.length}, 1fr)`, gap: 14, marginBottom: 22 }}>
        {stats.map((s, i) => <StatCard key={i} {...s} />)}
      </div>
      {children}
    </div>
  );
}

/* --- AppScript fetch helper --- */
async function fetchSheet(sheetName) {
  if (CONFIG.DEMO_MODE) return null;
  const res = await fetch(`${CONFIG.APPS_SCRIPT_URL}?sheet=${sheetName}`);
  const json = await res.json();
  return json.data;
}

function useSheetData(mockKey, sheetName) {
  const [data, setData] = useState(MOCK[mockKey]);
  const [loading, setLoading] = useState(false);

  const refresh = async () => {
    if (CONFIG.DEMO_MODE) { setData(MOCK[mockKey]); return; }
    setLoading(true);
    try {
      const live = await fetchSheet(sheetName);
      if (live) setData(live);
    } catch(e) { console.error('Sheet fetch error:', e); }
    setLoading(false);
  };

  useEffect(() => { refresh(); }, []);
  return { data, loading, refresh };
}

/* ════════════════════════════════════════════════
   🔐  LOGIN PAGE
════════════════════════════════════════════════ */
function LoginPage({ onLogin }) {
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const btnRef = useRef(null);

  useEffect(() => {
    if (!window.google?.accounts?.id) return;
    window.google.accounts.id.initialize({
      client_id: CONFIG.GOOGLE_CLIENT_ID,
      hosted_domain: CONFIG.ALLOWED_DOMAIN,
      callback: (response) => {
        try {
          const payload = JSON.parse(atob(response.credential.split('.')[1]));
          if (!payload.email.endsWith('@' + CONFIG.ALLOWED_DOMAIN)) {
            setError('Åtkomst nekad. Endast @' + CONFIG.ALLOWED_DOMAIN + '-konton är tillåtna.');
            return;
          }
          const avatar = (payload.name || '?').split(' ').map(p => p[0]).join('').slice(0, 2).toUpperCase();
          onLogin({ name: payload.name, email: payload.email, avatar, picture: payload.picture });
        } catch(e) {
          setError('Inloggning misslyckades. Försök igen.');
        }
      }
    });
    if (btnRef.current) {
      window.google.accounts.id.renderButton(btnRef.current, { theme: 'outline', size: 'large', width: 340, locale: 'sv' });
    }
  }, []);

  const demoLogin = () => {
    setLoading(true);
    setTimeout(() => onLogin({ name: 'Admin Behjärta', email: 'admin@behjarta.com', avatar: 'AB' }), 1100);
  };

  return (
    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'linear-gradient(140deg, #003D35 0%, #00695C 40%, #009688 70%, #26A69A 100%)', position: 'relative', overflow: 'hidden' }}>
      {/* Decorative rings */}
      {[350, 550, 750].map((size, i) => (
        <div key={i} style={{ position: 'absolute', width: size, height: size, borderRadius: '50%', border: '1px solid rgba(255,255,255,0.055)', top: '50%', left: '50%', transform: `translate(-${30 + i * 10}%, -${50 + i * 5}%)`, pointerEvents: 'none' }} />
      ))}
      <div style={{ background: T.white, borderRadius: 20, padding: '44px 40px', width: '100%', maxWidth: 420, boxShadow: '0 30px 80px rgba(0,0,0,0.35)', textAlign: 'center', position: 'relative', zIndex: 1 }}>
        <img src="https://behjarta.com/g22.png" alt="Behjärta" style={{ height: 46, marginBottom: 8 }} onError={e => e.target.style.display = 'none'} />
        <div style={{ fontSize: 11, color: T.muted, letterSpacing: '0.18em', textTransform: 'uppercase', fontWeight: 700, marginBottom: 28 }}>Administrationsportal</div>

        <h1 style={{ fontSize: 22, fontWeight: 700, color: T.text, marginBottom: 8 }}>Välkommen tillbaka</h1>
        <p style={{ fontSize: 13, color: T.muted, marginBottom: 28, lineHeight: 1.65 }}>
          Logga in med ditt&nbsp;<strong style={{ color: T.primaryDark }}>@behjarta.com</strong>-konto. Åtkomst är begränsad till din organisation.
        </p>

        {error && (
          <div style={{ background: '#FEF2F2', border: '1px solid #FECACA', color: T.danger, padding: '10px 14px', borderRadius: 10, fontSize: 13, marginBottom: 18, textAlign: 'left', display: 'flex', gap: 8, alignItems: 'flex-start' }}>
            <span>⚠️</span><span>{error}</span>
          </div>
        )}

        {/* Real Google button (appears when GIS loads) */}
        <div ref={btnRef} style={{ display: 'flex', justifyContent: 'center', marginBottom: 10 }} />

        {/* Demo login button */}
        {CONFIG.DEMO_MODE && (
          <button onClick={demoLogin} disabled={loading}
            style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 11, width: '100%', padding: '12px', background: loading ? '#F9FAFB' : T.white, border: `1.5px dashed ${loading ? T.border : T.primaryMid}`, borderRadius: 10, cursor: loading ? 'not-allowed' : 'pointer', fontSize: 13, fontWeight: 600, color: loading ? T.muted : T.primaryDark, fontFamily: 'inherit', transition: 'all 0.18s' }}
            onMouseEnter={e => { if (!loading) { e.currentTarget.style.background = T.primaryLight; } }}
            onMouseLeave={e => { if (!loading) { e.currentTarget.style.background = T.white; } }}>
            {loading
              ? <><span className="spin" style={{ display: 'inline-block', width: 15, height: 15, border: `2px solid ${T.border}`, borderTopColor: T.primary, borderRadius: '50%' }} /> Loggar in...</>
              : <>🧪 Demo-inloggning (testläge)</>
            }
          </button>
        )}

        <div style={{ marginTop: 22, padding: '12px', background: '#F8FAFC', borderRadius: 10, fontSize: 11, color: T.muted, lineHeight: 1.6 }}>
          🔒 Skyddad sida — Åtkomst begränsad till <strong>@{CONFIG.ALLOWED_DOMAIN}</strong>
        </div>
      </div>
    </div>
  );
}
