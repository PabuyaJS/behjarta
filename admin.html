/* ════════════════════════════
   DATE / TIME HELPERS
   
   Core problem: Google Sheets serialises dates as ISO strings like
   "2026-05-31T00:00:00.000Z" and times as "1899-12-30T08:00:00.000Z".
   When JavaScript parses these with `new Date()` it treats them as UTC,
   then any call to getHours() / toLocaleDateString() converts to the
   browser's local timezone (Europe/Stockholm = UTC+1 or UTC+2 in summer),
   causing times to appear 1 hour EARLIER and midnight-dates to appear
   1 day EARLIER.

   Fix: always read the RAW UTC components (getUTC*) – never the local ones.

   Offset variants (+1 day / +1 hour) are used exclusively in Bookings and
   Shifts views so the displayed value matches what is stored in the Sheet.
════════════════════════════ */

/** Parse any date/datetime string into a Date object (UTC-safe). */
function parseToDate(val) {
  if (val == null || val === '') return null;
  const s = String(val).trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) {
    // Plain date string — treat as UTC midnight
    const [y, m, d] = s.split('-').map(Number);
    return new Date(Date.UTC(y, m - 1, d));
  }
  // ISO datetime or anything with a T — parse directly
  const d = new Date(s.includes('T') ? s : s.replace(' ', 'T'));
  return isNaN(d) ? null : d;
}

/** Format a Date as "yyyy-MM-dd" using UTC parts. */
function fmtDateUTC(d) {
  const y  = d.getUTCFullYear();
  const mo = String(d.getUTCMonth() + 1).padStart(2, '0');
  const dy = String(d.getUTCDate()).padStart(2, '0');
  return `${y}-${mo}-${dy}`;
}

/** Format a Date as "HH:mm" using UTC parts. */
function fmtTimeUTC(d) {
  return `${String(d.getUTCHours()).padStart(2,'0')}:${String(d.getUTCMinutes()).padStart(2,'0')}`;
}

/** Format a full datetime as "yyyy-MM-dd HH:mm:ss" (no T) using UTC parts.
 *  Used for created_at-style timestamps. */
function fmtDatetimeUTC(d) {
  const date = fmtDateUTC(d);
  const hh   = String(d.getUTCHours()).padStart(2,'0');
  const mm   = String(d.getUTCMinutes()).padStart(2,'0');
  const ss   = String(d.getUTCSeconds()).padStart(2,'0');
  return `${date} ${hh}:${mm}:${ss}`;
}

/** Render a date value as yyyy-MM-dd, always using UTC parts. */
function renderDate(val) {
  if (val == null || val === '') return '—';
  const s = String(val).trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const d = parseToDate(s);
  if (!d) return s;
  return fmtDateUTC(d);
}

/** Render a date value as yyyy-MM-dd with +1 day offset.
 *  Used in Bookings and Shifts card/overview/edit views. */
function renderDateOffset(val) {
  if (val == null || val === '') return '—';
  const s = String(val).trim();
  const d = parseToDate(s);
  if (!d) return s;
  d.setUTCDate(d.getUTCDate() + 1);
  return fmtDateUTC(d);
}

/** Render a time value as HH:mm, always using UTC parts. */
function renderTime(val) {
  if (val == null || val === '') return '—';
  const s = String(val).trim();
  if (/^\d{2}:\d{2}/.test(s)) return s.slice(0, 5);
  if (s.includes('T')) {
    const d = parseToDate(s);
    if (!d) return s;
    return fmtTimeUTC(d);
  }
  return s.slice(0, 5);
}

/** Render a time value as HH:mm with +1 hour offset.
 *  Used in Bookings and Shifts card/overview/edit views. */
function renderTimeOffset(val) {
  if (val == null || val === '') return '—';
  const s = String(val).trim();
  let d;
  if (/^\d{2}:\d{2}/.test(s)) {
    // Plain HH:mm — build a synthetic UTC Date so we can add 1 hour
    const [hh, mm] = s.split(':').map(Number);
    d = new Date(Date.UTC(1970, 0, 1, hh, mm, 0));
  } else if (s.includes('T')) {
    d = parseToDate(s);
    if (!d) return s;
  } else {
    return s.slice(0, 5);
  }
  d.setUTCHours(d.getUTCHours() + 1);
  return fmtTimeUTC(d);
}

/** Render a full datetime (created_at style) as "yyyy-MM-dd HH:mm:ss" — no T. */
function renderDatetime(val) {
  if (val == null || val === '') return '—';
  const s = String(val).trim();
  // Already formatted without T
  if (/^\d{4}-\d{2}-\d{2} \d{2}:\d{2}/.test(s)) return s.slice(0, 19);
  const d = parseToDate(s);
  if (!d) return s;
  return fmtDatetimeUTC(d);
}

/** Convert any date-ish value to a plain yyyy-MM-dd string (for filtering
 *  and date-input population), always using UTC parts. */
function toYMD(val) {
  if (!val || val === '—') return '';
  const s = String(val).trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const d = parseToDate(s);
  if (!d) return '';
  return fmtDateUTC(d);
}

/** toYMD with +1 day — used for filtering in Bookings/Shifts
 *  so the filter range matches what the user sees on screen. */
function toYMDOffset(val) {
  if (!val || val === '—') return '';
  const s = String(val).trim();
  const d = parseToDate(s);
  if (!d) return '';
  d.setUTCDate(d.getUTCDate() + 1);
  return fmtDateUTC(d);
}

/** Convert any time-ish value to a plain HH:mm string for time-input
 *  population, always using UTC parts. */
function toHHMM(val) {
  if (!val || val === '—') return '';
  const s = String(val).trim();
  if (/^\d{2}:\d{2}/.test(s)) return s.slice(0, 5);
  if (s.includes('T')) {
    const d = parseToDate(s);
    if (!d) return '';
    return fmtTimeUTC(d);
  }
  return s.slice(0, 5);
}

/** toHHMM with +1 hour — for pre-filling time inputs in Bookings/Shifts edit modals. */
function toHHMMOffset(val) {
  if (!val || val === '—') return '';
  const s = String(val).trim();
  let d;
  if (/^\d{2}:\d{2}/.test(s)) {
    const [hh, mm] = s.split(':').map(Number);
    d = new Date(Date.UTC(1970, 0, 1, hh, mm, 0));
  } else if (s.includes('T')) {
    d = parseToDate(s);
    if (!d) return '';
  } else {
    return s.slice(0, 5);
  }
  d.setUTCHours(d.getUTCHours() + 1);
  return fmtTimeUTC(d);
}

/** toYMD +1 day for date inputs in Bookings/Shifts edit modals. */
function toYMDOffsetInput(val) {
  if (!val || val === '—') return '';
  const s = String(val).trim();
  const d = parseToDate(s);
  if (!d) return '';
  d.setUTCDate(d.getUTCDate() + 1);
  return fmtDateUTC(d);
}

const DATE_KEYS = new Set([
  'Date','Contract_sent_date','Contract_start_date',
  'Contract_resignation_date','Contract_end_date','contract_start_date',
  '6_months_probation','contract_end_date','Discount_exparation','date'

const TIME_KEYS = new Set([

]);

/** Return the clean display value for a field when populating an edit input.
 *  – date fields  → yyyy-MM-dd   (from UTC parts)
 *  – time fields  → HH:mm        (from UTC parts)
 *  – everything else → raw string
 */
function editValue(key, val) {
  if (val == null || val === '') return '';
  if (DATE_KEYS.has(key)) return toYMD(val) || String(val);
  if (TIME_KEYS.has(key)) return toHHMM(val) || String(val);
  if (key === 'created_at') return renderDatetime(val);
  return String(val);
}

/** editValue with +1 day / +1 hour offsets for Bookings and Shifts modals. */
function editValueOffset(key, val) {
  if (val == null || val === '') return '';
  if (DATE_KEYS.has(key)) return toYMDOffsetInput(val) || String(val);
  if (TIME_KEYS.has(key)) return toHHMMOffset(val) || String(val);
  if (key === 'created_at') return renderDatetime(val);
  return String(val);
}

/* ════════════════════════════
   FORMAT ROW FOR SAVE
   Normalises edited values back to the format Sheets expects.
   When the user has seen +1 day / +1 hour, we subtract it back out
   before sending to the sheet.
════════════════════════════ */
function formatForSheet(key, val) {
  if (val == null || val === '') return val;
  const s = String(val).trim();
  if (TIME_KEYS.has(key)) {
    if (/^\d{2}:\d{2}(:\d{2})?$/.test(s)) return s.length === 5 ? s + ':00' : s;
    if (s.includes('T')) {
      const timePart = s.split('T')[1] || '';
      return timePart.slice(0, 8) || s;
    }
    return s;
  }
  if (DATE_KEYS.has(key)) {
    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    if (s.includes('T')) return s.split('T')[0];
    const d = parseToDate(s);
    if (d) return fmtDateUTC(d);
    return s;
  }
  return val;
}

/** formatForSheet but subtracts the +1 day / +1 hour offset before saving,
 *  so the Sheet always receives the original UTC value. */
function formatForSheetOffset(key, val) {
  if (val == null || val === '') return val;
  const s = String(val).trim();
  if (DATE_KEYS.has(key)) {
    // The user edited a yyyy-MM-dd value that was already +1 day; subtract 1 day back
    const d = parseToDate(s);
    if (d) {
      d.setUTCDate(d.getUTCDate() - 1);
      return fmtDateUTC(d);
    }
    return formatForSheet(key, val);
  }
  if (TIME_KEYS.has(key)) {
    // The user edited an HH:mm value that was already +1 hour; subtract 1 hour back
    let d;
    if (/^\d{2}:\d{2}/.test(s)) {
      const [hh, mm] = s.split(':').map(Number);
      d = new Date(Date.UTC(1970, 0, 1, hh, mm, 0));
    } else if (s.includes('T')) {
      d = parseToDate(s);
    }
    if (d) {
      d.setUTCHours(d.getUTCHours() - 1);
      const result = fmtTimeUTC(d) + ':00';
      return result;
    }
    return formatForSheet(key, val);
  }
  return formatForSheet(key, val);
}

function formatRowForSheet(row) {
  const out = {};
  for (const [k, v] of Object.entries(row)) out[k] = formatForSheet(k, v);
  return out;
}

function formatRowForSheetOffset(row) {
  const out = {};
  for (const [k, v] of Object.entries(row)) out[k] = formatForSheetOffset(k, v);
  return out;
}

/* ════════════════════════════
   API HELPERS — JSONP
════════════════════════════ */
function jsonp(url, params = {}, timeoutMs = 12000) {
  return new Promise((resolve, reject) => {
    const cbName = '__bh_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const qs = new URLSearchParams({ ...params, callback: cbName }).toString();
    const script = document.createElement('script');
    const timer = setTimeout(() => { cleanup(); reject(new Error('Timeout')); }, timeoutMs);
    function cleanup() { clearTimeout(timer); delete window[cbName]; if (script.parentNode) script.parentNode.removeChild(script); }
    window[cbName] = (data) => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('Nätverksfel')); };
    script.src = `${url}?${qs}`;
    document.head.appendChild(script);
  });
}
async function fetchSheet(sheetName) {
  const res = await jsonp(CONFIG.APPS_SCRIPT_URL, { sheet: sheetName });
  if (!res.success) throw new Error(res.error || 'Okänt fel');
  return res.data;
}
async function updateSheetRow(sheetName, idKey, idValue, updatedRow) {
  const res = await jsonp(CONFIG.APPS_SCRIPT_URL, { action:'update', sheet:sheetName, idKey, idValue:String(idValue), row:JSON.stringify(updatedRow) });
  if (!res.success) throw new Error(res.error || 'Uppdatering misslyckades');
}
function useSheetData(mockKey, sheetName) {
  const [data, setData]       = useState(MOCK[mockKey] || []);
  const [loading, setLoading] = useState(false);
  const [error, setError]     = useState(null);
  const refresh = useCallback(async () => {
    if (CONFIG.DEMO_MODE) { setData([...(MOCK[mockKey] || [])]); return; }
    setLoading(true); setError(null);
    try { setData(await fetchSheet(sheetName)); } catch(e) { setError(e.message); }
    setLoading(false);
  }, [mockKey, sheetName]);
  useEffect(() => { refresh(); }, []);
  const saveRow = useCallback(async (idKey, idValue, updatedRow) => {
    if (CONFIG.DEMO_MODE) { setData(prev => prev.map(r => String(r[idKey]) === String(idValue) ? { ...r, ...updatedRow } : r)); return; }
    await updateSheetRow(sheetName, idKey, idValue, updatedRow);
    await refresh();
  }, [sheetName, refresh]);
  return { data, loading, error, refresh, saveRow };
}

function getMonthRange() {
  const now = new Date();
  const y = now.getFullYear();
  const m = now.getMonth();
  const first = new Date(y, m, 1);
  const last  = new Date(y, m + 1, 0);
  const fmt = d => d.toLocaleDateString('sv-SE');
  return { from: fmt(first), to: fmt(last) };
}

function MiniCalendar({ year, month, selectedFrom, selectedTo, hoverDate, onDateClick, onDateHover }) {
  const firstDay = new Date(year, month, 1);
  let startDow = firstDay.getDay();
  startDow = startDow === 0 ? 6 : startDow - 1;
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < startDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) {
    cells.push(`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
  }
  const inRange = (ymd) => {
    if (!ymd || !selectedFrom) return false;
    const hi = (hoverDate && !selectedTo && hoverDate >= selectedFrom) ? hoverDate : selectedTo;
    if (!hi) return false;
    return ymd > selectedFrom && ymd < hi;
  };
  const isFrom = ymd => ymd && ymd === selectedFrom;
  const isTo   = ymd => ymd && ymd === selectedTo;
  const isHov  = ymd => ymd && !selectedTo && hoverDate === ymd && selectedFrom;
  return (
    <div style={{ width:220 }}>
      <div style={{ textAlign:'center', fontWeight:700, fontSize:13, color:T.text, marginBottom:10 }}>{SV_MONTHS[month]} {year}</div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:2, marginBottom:4 }}>
        {SV_DAYS.map(d => <div key={d} style={{ textAlign:'center', fontSize:10, fontWeight:700, color:T.muted }}>{d}</div>)}
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:2 }}>
        {cells.map((ymd, i) => {
          if (!ymd) return <div key={`e${i}`} />;
          const from = isFrom(ymd), to = isTo(ymd), range = inRange(ymd), hov = isHov(ymd);
          let bg = 'transparent', color = T.text, fw = 400;
          if (from || to) { bg = T.primary; color = '#fff'; fw = 700; }
          else if (range || hov) { bg = T.primaryLight; color = T.primaryDark; }
          return (
            <div key={ymd} onClick={() => onDateClick(ymd)} onMouseEnter={() => onDateHover(ymd)}
              style={{ textAlign:'center', fontSize:12, padding:'5px 2px', borderRadius:6, background:bg, color, fontWeight:fw, cursor:'pointer', transition:'background 0.1s' }}
              onMouseDown={e => e.preventDefault()}>
              {parseInt(ymd.split('-')[2])}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function DateRangePicker({ from, to, onChange }) {
  const [open, setOpen]       = useState(false);
  const [hoverDate, setHover] = useState(null);
  const [selecting, setSelecting] = useState(false);
  const [tempFrom, setTempFrom]   = useState(from);
  const [tempTo, setTempTo]       = useState(to);
  const [viewYear1, setVY1] = useState(() => new Date().getFullYear());
  const [viewMonth1, setVM1] = useState(() => new Date().getMonth());
  const popRef = useRef(null);
  const btnRef = useRef(null);
  const [pos, setPos] = useState({ top:0, left:0 });
  const month2 = viewMonth1 === 11 ? 0 : viewMonth1 + 1;
  const year2  = viewMonth1 === 11 ? viewYear1 + 1 : viewYear1;
  useEffect(() => { setTempFrom(from); setTempTo(to); }, [from, to]);
  useEffect(() => {
    if (!open) return;
    const handler = e => {
      if (popRef.current && !popRef.current.contains(e.target) && btnRef.current && !btnRef.current.contains(e.target)) setOpen(false);
    };
    setTimeout(() => document.addEventListener('mousedown', handler), 0);
    return () => document.removeEventListener('mousedown', handler);
  }, [open]);
  const openPicker = () => {
    if (btnRef.current) { const r = btnRef.current.getBoundingClientRect(); setPos({ top:r.bottom+6, left:r.left }); }
    setSelecting(false); setOpen(o => !o);
  };
  const handleDateClick = (ymd) => {
    if (!selecting) { setTempFrom(ymd); setTempTo(null); setSelecting(true); }
    else { if (ymd < tempFrom) { setTempFrom(ymd); setTempTo(tempFrom); } else { setTempTo(ymd); } setSelecting(false); }
  };
  const apply = () => { if (tempFrom && tempTo) { onChange({ from:tempFrom, to:tempTo }); setOpen(false); } };
  const reset = () => { const def = getMonthRange(); setTempFrom(def.from); setTempTo(def.to); onChange(def); setOpen(false); };
  const prevMonth = () => { if (viewMonth1===0){setVM1(11);setVY1(y=>y-1);}else setVM1(m=>m-1); };
  const nextMonth = () => { if (viewMonth1===11){setVM1(0);setVY1(y=>y+1);}else setVM1(m=>m+1); };
  const label = (from && to) ? `${from}  →  ${to}` : 'Välj datumintervall';
  return (
    <>
      <div ref={btnRef} className="date-range-bar" onClick={openPicker} style={{ display:'flex', alignItems:'center', gap:8, minWidth:240 }}>
        <span style={{ fontSize:14 }}>📅</span>
        <span style={{ flex:1, fontSize:13, color:(from&&to)?T.text:T.muted }}>{label}</span>
        <span style={{ fontSize:10, color:T.muted }}>▾</span>
      </div>
      {open && ReactDOM.createPortal(
        <div ref={popRef} className="date-picker-popup" style={{ top:pos.top, left:pos.left }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
            <button onClick={prevMonth} style={{ background:'none', border:`1px solid ${T.border}`, borderRadius:7, padding:'4px 10px', color:T.muted, fontSize:14, cursor:'pointer' }}>‹</button>
            <div style={{ fontSize:12, color:T.muted, fontWeight:600 }}>{selecting?'📌 Välj slutdatum':'📌 Välj startdatum'}</div>
            <button onClick={nextMonth} style={{ background:'none', border:`1px solid ${T.border}`, borderRadius:7, padding:'4px 10px', color:T.muted, fontSize:14, cursor:'pointer' }}>›</button>
          </div>
          <div style={{ display:'flex', gap:28 }}>
            <MiniCalendar year={viewYear1} month={viewMonth1} selectedFrom={tempFrom} selectedTo={tempTo} hoverDate={hoverDate} onDateClick={handleDateClick} onDateHover={setHover} />
            <MiniCalendar year={year2} month={month2} selectedFrom={tempFrom} selectedTo={tempTo} hoverDate={hoverDate} onDateClick={handleDateClick} onDateHover={setHover} />
          </div>
          <div style={{ display:'flex', gap:8, marginTop:14, paddingTop:12, borderTop:`1px solid ${T.border}`, alignItems:'center' }}>
            <span style={{ fontSize:12, color:T.muted, flex:1 }}>{tempFrom&&tempTo?`${tempFrom}  →  ${tempTo}`:tempFrom?`${tempFrom}  →  …`:'Inget intervall valt'}</span>
            <button onClick={reset} style={{ padding:'6px 14px', border:`1px solid ${T.border}`, borderRadius:8, background:'#F9FAFB', color:T.muted, fontSize:12, fontWeight:600, cursor:'pointer' }}>Denna månad</button>
            <button onClick={apply} disabled={!tempFrom||!tempTo} style={{ padding:'6px 16px', border:'none', borderRadius:8, background:(!tempFrom||!tempTo)?T.border:T.primary, color:'#fff', fontSize:12, fontWeight:600, cursor:(!tempFrom||!tempTo)?'not-allowed':'pointer' }}>Använd</button>
          </div>
        </div>,
        document.body
      )}
    </>
  );
}

function FilterPopover({ colKey, colLabel, allValues, currentFilter, onSort, onSetFilter, onClose, anchor }) {
  const ref = useRef(null);
  const [search, setSearch] = useState('');
  const [selected, setSelected] = useState(() => currentFilter ? new Set(currentFilter) : new Set(allValues));
  useEffect(() => {
    const handler = e => { if (ref.current && !ref.current.contains(e.target)) onClose(); };
    const id = setTimeout(() => document.addEventListener('mousedown', handler), 0);
    return () => { clearTimeout(id); document.removeEventListener('mousedown', handler); };
  }, [onClose]);
  const displayValues = useMemo(() => allValues.filter(v => String(v).toLowerCase().includes(search.toLowerCase())), [allValues, search]);
  const allChecked  = displayValues.length > 0 && displayValues.every(v => selected.has(v));
  const someChecked = !allChecked && displayValues.some(v => selected.has(v));
  const toggleValue = v => setSelected(prev => { const next = new Set(prev); next.has(v) ? next.delete(v) : next.add(v); return next; });
  const applyFilter = () => { const allSel = allValues.every(v => selected.has(v)); onSetFilter(colKey, allSel ? null : new Set(selected)); onClose(); };
  const left = Math.min(anchor.left, window.innerWidth - 248);

  };
  return ReactDOM.createPortal(
    <div ref={ref} style={{ position:'fixed', top, left, width:242, zIndex:999999, background:'#fff', border:`1px solid ${T.border}`, borderRadius:10, boxShadow:'0 10px 36px rgba(0,0,0,0.18)', fontFamily:"'Plus Jakarta Sans',sans-serif", overflow:'hidden' }}>
      <div style={{ padding:'8px 10px 6px', background:T.primaryLight, borderBottom:`1px solid ${T.border}` }}><div style={{ fontSize:11, fontWeight:700, color:T.primaryDark, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{colLabel}</div></div>
      <div style={{ padding:'6px 6px 4px', borderBottom:`1px solid ${T.border}` }}>
        <div style={{ fontSize:10, fontWeight:700, color:T.muted, textTransform:'uppercase', letterSpacing:'0.06em', padding:'0 4px 4px' }}>Sortering</div>
        <SortBtn dir="asc" label="↑  A → Ö  (stigande)" /><SortBtn dir="desc" label="↓  Ö → A  (fallande)" />
      </div>
      <div style={{ padding:'6px 8px 4px' }}>
        <div style={{ fontSize:10, fontWeight:700, color:T.muted, textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:5 }}>Filter</div>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Sök värde..."
          style={{ width:'100%', padding:'5px 8px', border:`1px solid ${T.border}`, borderRadius:6, fontSize:12, outline:'none', fontFamily:'inherit', color:T.text, marginBottom:5 }}
          onFocus={e => e.target.style.borderColor=T.primary} onBlur={e => e.target.style.borderColor=T.border} />
        <div style={{ maxHeight:170, overflowY:'auto', marginRight:-2, paddingRight:2 }}>
          <label style={{ display:'flex', alignItems:'center', gap:7, padding:'4px 4px 5px', borderBottom:`1px solid ${T.border}`, marginBottom:3, cursor:'pointer', fontSize:12, color:T.text, fontWeight:700 }}>
            <input type="checkbox" checked={allChecked} ref={el => { if (el) el.indeterminate = someChecked; }} onChange={() => { if (allChecked) setSelected(new Set()); else setSelected(new Set(displayValues)); }} style={{ accentColor:T.primary, width:13, height:13, flexShrink:0 }} />(Välj alla)
          </label>
          {displayValues.map(v => (
            <label key={v} style={{ display:'flex', alignItems:'center', gap:7, padding:'3px 4px', borderRadius:5, cursor:'pointer', fontSize:12, color:T.text }} onMouseEnter={e => e.currentTarget.style.background=T.primaryLight} onMouseLeave={e => e.currentTarget.style.background='none'}>
              <input type="checkbox" checked={selected.has(v)} onChange={() => toggleValue(v)} style={{ accentColor:T.primary, width:13, height:13, flexShrink:0 }} />
              <span style={{ overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{v}</span>
            </label>
          ))}
          {displayValues.length === 0 && <div style={{ fontSize:12, color:T.muted, textAlign:'center', padding:'10px 0' }}>Inga matchande värden</div>}
        </div>
      </div>
      <div style={{ padding:'7px 8px 8px', borderTop:`1px solid ${T.border}`, display:'flex', gap:6 }}>
        <button onClick={() => { onSetFilter(colKey, null); onClose(); }} style={{ flex:1, padding:'6px 8px', border:`1px solid ${T.border}`, borderRadius:7, background:'#F9FAFB', color:T.muted, fontSize:12, fontWeight:600, cursor:'pointer', fontFamily:'inherit' }} onMouseEnter={e => { e.currentTarget.style.background='#F3F4F6'; e.currentTarget.style.color=T.text; }} onMouseLeave={e => { e.currentTarget.style.background='#F9FAFB'; e.currentTarget.style.color=T.muted; }}>Rensa</button>
        <button onClick={applyFilter} style={{ flex:2, padding:'6px 8px', border:'none', borderRadius:7, background:T.primary, color:'#fff', fontSize:12, fontWeight:600, cursor:'pointer', fontFamily:'inherit' }} onMouseEnter={e => e.currentTarget.style.background=T.primaryDark} onMouseLeave={e => e.currentTarget.style.background=T.primary}>Använd filter</button>
      </div>
    </div>,
    document.body
  );
}

/* ════════════════════════════
   DATA TABLE  (Tickets / Customers / Employees — no offset)
════════════════════════════ */
const PAGE_SIZE = 15;

function DataTable({ columns, rows, onRefresh, loading, error, idKey, onSave, editTitle }) {
  const [q, setQ]               = useState('');
  const [sortCol, setSortCol]   = useState(null);
  const [sortDir, setSortDir]   = useState('asc');
  const [page, setPage]         = useState(0);
  const [editRow, setEditRow]   = useState(null);
  const [filters, setFilters]   = useState({});
  const [openFilter, setOpenFilter]     = useState(null);
  const [filterAnchor, setFilterAnchor] = useState(null);
  const columnValues = useMemo(() => {
    const result = {};
    columns.forEach(col => { result[col.key] = [...new Set(rows.map(r => { const v=r[col.key]; return (v==null||v==='')?'(tom)':String(v); }))].sort((a,b)=>a.localeCompare(b,'sv')); });
    return result;
  }, [rows, columns]);
  const filtered = useMemo(() => {
    const lq = q.toLowerCase();
    return rows.filter(r => {
      if (lq && !Object.values(r).some(v => String(v).toLowerCase().includes(lq))) return false;
      for (const [colKey, allowed] of Object.entries(filters)) {
        if (!allowed) continue;
        const v=r[colKey]; const sv=(v==null||v==='')?'(tom)':String(v);
        if (!allowed.has(sv)) return false;
      }
      return true;
    });
  }, [rows, q, filters]);
  const sorted = useMemo(() => {
    if (!sortCol) return filtered;
    return [...filtered].sort((a,b) => { const av=String(a[sortCol]??''),bv=String(b[sortCol]??''); return sortDir==='asc'?av.localeCompare(bv,'sv'):bv.localeCompare(av,'sv'); });
  }, [filtered, sortCol, sortDir]);
  const pages  = Math.max(1, Math.ceil(sorted.length / PAGE_SIZE));
  const safePg = Math.min(page, pages - 1);
  const paged  = sorted.slice(safePg * PAGE_SIZE, (safePg + 1) * PAGE_SIZE);
  const handleLabelSort   = colKey => { setSortDir(prev => sortCol===colKey?(prev==='asc'?'desc':'asc'):'asc'); setSortCol(colKey); setPage(0); };
  const handlePopoverSort = (colKey, dir) => { setSortCol(colKey); setSortDir(dir); setPage(0); };
  const handleSetFilter   = (colKey, setOrNull) => { setFilters(prev => ({...prev,[colKey]:setOrNull})); setPage(0); };
  const clearAllFilters   = () => { setFilters({}); setPage(0); };
  const openFilterPopover = (e, colKey) => { e.stopPropagation(); if(openFilter===colKey){setOpenFilter(null);setFilterAnchor(null);return;} setFilterAnchor(e.currentTarget.getBoundingClientRect()); setOpenFilter(colKey); };
  const activeFilterCount = Object.values(filters).filter(v=>v!==null).length;
  const TH_BASE = { padding:'0', textAlign:'left', fontSize:11, fontWeight:700, color:T.primaryDark, textTransform:'uppercase', letterSpacing:'0.06em', whiteSpace:'nowrap', background:T.primaryLight, borderBottom:`1px solid ${T.primaryMid}` };
  return (
    <>
      {openFilter && filterAnchor && <FilterPopover colKey={openFilter} colLabel={columns.find(c=>c.key===openFilter)?.label||openFilter} allValues={columnValues[openFilter]||[]} currentFilter={filters[openFilter]||null} onSort={handlePopoverSort} onSetFilter={handleSetFilter} onClose={()=>{setOpenFilter(null);setFilterAnchor(null);}} anchor={filterAnchor} />}
      {editRow && <EditModal row={editRow} title={editTitle} onClose={()=>setEditRow(null)} onSave={async updated=>{await onSave(idKey,editRow[idKey],updated);setEditRow(null);}} />}

        </div>
        <span style={{ fontSize:12, color:T.muted }}>{sorted.length} poster</span>
        {activeFilterCount > 0 && <div style={{ display:'flex', alignItems:'center', gap:6, background:'#FEF3C7', border:'1px solid #FDE68A', borderRadius:8, padding:'4px 10px', fontSize:12, color:'#92400E', fontWeight:600 }}><span>🔽 {activeFilterCount} filter aktiva</span><button onClick={clearAllFilters} style={{ background:'none', border:'none', color:'#92400E', cursor:'pointer', fontWeight:700, fontSize:13, padding:'0 2px', lineHeight:1 }}>×</button></div>}
        {loading && <span className="spin" style={{ width:14, height:14, border:`2px solid ${T.border}`, borderTopColor:T.primary, borderRadius:'50%' }} />}
        {error && <span style={{ fontSize:12, color:T.danger }}>⚠️ {error}</span>}
        <button onClick={onRefresh} style={{ marginLeft:'auto', padding:'7px 14px', background:T.primaryLight, border:`1px solid ${T.primaryMid}`, borderRadius:8, color:T.primaryDark, fontSize:12, fontWeight:600, display:'flex', alignItems:'center', gap:5 }} onMouseEnter={e=>{e.currentTarget.style.background=T.primaryMid;e.currentTarget.style.color='#fff';}} onMouseLeave={e=>{e.currentTarget.style.background=T.primaryLight;e.currentTarget.style.color=T.primaryDark;}}>↻ Uppdatera</button>

            <thead><tr>
              {columns.map(col => {
                const isFiltered = !!(filters[col.key]) && filters[col.key] !== null;
                return (
                  <th key={col.key} style={{ ...TH_BASE }}>
                    <div style={{ display:'flex', alignItems:'center', padding:'9px 10px 9px 14px', gap:4 }}>
                      <span onClick={() => !col.noSort && handleLabelSort(col.key)} style={{ flex:1, cursor:col.noSort?'default':'pointer', userSelect:'none' }}>{col.label}{sortCol===col.key?(sortDir==='asc'?' ↑':' ↓'):''}</span>
                      <button onClick={e=>openFilterPopover(e,col.key)} style={{ background:isFiltered?T.primary:'transparent', border:isFiltered?`1px solid ${T.primaryDark}`:'1px solid transparent', borderRadius:5, padding:'1px 4px', cursor:'pointer', color:isFiltered?'#fff':T.primaryDark, fontSize:10, lineHeight:1.4, flexShrink:0 }} onMouseEnter={e=>{if(!isFiltered){e.currentTarget.style.background=T.primaryMid;e.currentTarget.style.color='#fff';e.currentTarget.style.borderColor=T.primaryMid;}}} onMouseLeave={e=>{if(!isFiltered){e.currentTarget.style.background='transparent';e.currentTarget.style.color=T.primaryDark;e.currentTarget.style.borderColor='transparent';}}}>{isFiltered?'🔽':'▾'}</button>

/* ════════════════════════════
   BOOKING CARD LIST
   — uses renderDateOffset / renderTimeOffset for card display
   — passes useOffset={true} to ViewEditModal
   — filters on toYMDOffset so the date range matches what user sees
════════════════════════════ */
function BookingCardList({ rows, loading, error, onRefresh, onSave, dateRange, onDateRangeChange }) {
  const [q, setQ]           = useState('');
  const [page, setPage]     = useState(0);
  const [viewRow, setViewRow] = useState(null);
  const filtered = useMemo(() => {
    const lq = q.toLowerCase();
    return rows.filter(r => {
      // Use offset date for range filtering so it matches what the user sees
      const d = toYMDOffset(r.Date);
      if (d && dateRange.from && dateRange.to) { if (d < dateRange.from || d > dateRange.to) return false; }
      if (lq && !Object.values(r).some(v => String(v).toLowerCase().includes(lq))) return false;
      return true;
    });
  }, [rows, q, dateRange]);
  const pages  = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const safePg = Math.min(page, pages - 1);
  const paged  = filtered.slice(safePg * PAGE_SIZE, (safePg + 1) * PAGE_SIZE);
  return (
    <>
      {viewRow && <ViewEditModal
        row={viewRow}
        title={`Bokning — ${viewRow.unique_ID}`}
        onClose={()=>setViewRow(null)}
        onSave={async updated=>{await onSave('unique_ID',viewRow.unique_ID,updated);setViewRow({...viewRow,...updated});}}
        cleaners={[]}
        cleanerFieldKeys={[]}
        useOffset={true}
      />}
      <div style={{ display:'flex', gap:10, alignItems:'center', marginBottom:14, flexWrap:'wrap' }}>
        <DateRangePicker from={dateRange.from} to={dateRange.to} onChange={onDateRangeChange} />
        <div style={{ position:'relative', flex:'1 1 180px', maxWidth:260 }}>
          <span style={{ position:'absolute', left:9, top:'50%', transform:'translateY(-50%)', color:T.muted, fontSize:12, pointerEvents:'none' }}>🔍</span>
          <input value={q} onChange={e=>{setQ(e.target.value);setPage(0);}} placeholder="Sök bokningar..." style={{ paddingLeft:30, paddingRight:10, paddingTop:8, paddingBottom:8, border:`1px solid ${T.border}`, borderRadius:8, fontSize:13, width:'100%', outline:'none' }} onFocus={e=>e.target.style.borderColor=T.primary} onBlur={e=>e.target.style.borderColor=T.border} />
        </div>
        <span style={{ fontSize:12, color:T.muted }}>{filtered.length} bokningar</span>
        {loading && <span className="spin" style={{ width:14, height:14, border:`2px solid ${T.border}`, borderTopColor:T.primary, borderRadius:'50%' }} />}
        {error && <span style={{ fontSize:12, color:T.danger }}>⚠️ {error}</span>}
        <button onClick={onRefresh} style={{ marginLeft:'auto', padding:'7px 14px', background:T.primaryLight, border:`1px solid ${T.primaryMid}`, borderRadius:8, color:T.primaryDark, fontSize:12, fontWeight:600, display:'flex', alignItems:'center', gap:5 }} onMouseEnter={e=>{e.currentTarget.style.background=T.primaryMid;e.currentTarget.style.color='#fff';}} onMouseLeave={e=>{e.currentTarget.style.background=T.primaryLight;e.currentTarget.style.color=T.primaryDark;}}>↻ Uppdatera</button>
      </div>
      {paged.length === 0
        ? <div style={{ textAlign:'center', padding:48, color:T.muted, fontSize:13 }}>Inga bokningar hittades</div>
        : paged.map((row, i) => {
            const price = row.Total_billable_lc ? `${parseFloat(row.Total_billable_lc).toLocaleString('sv-SE')} kr` : '—';
            return (
              <div key={row.unique_ID??i} className="card-row" onClick={()=>setViewRow(row)}>
                <div style={{ width:4, background:T.primary, flexShrink:0 }} />
                <div style={{ flex:1, padding:'14px 16px' }}>
                  <div style={{ fontSize:14, fontWeight:700, color:T.text, marginBottom:3 }}>{row.Name||'—'}</div>
                  <div style={{ fontSize:12, color:T.primaryDark, fontWeight:600, marginBottom:6 }}>{row.Type||'—'}</div>
                  <div style={{ fontSize:12, color:T.muted, marginBottom:2 }}>{row.Address||'—'}</div>
                  <div style={{ fontSize:12, color:T.muted, display:'flex', gap:8 }}><span>{row.PostalCode||'—'}</span><span>{row.City||'—'}</span></div>
                </div>
                <div style={{ padding:'14px 18px', display:'flex', flexDirection:'column', alignItems:'flex-end', justifyContent:'center', gap:6, flexShrink:0, borderLeft:`1px solid ${T.border}`, minWidth:130 }}>
                  {/* +1 day on card */}
                  <span style={{ fontSize:11, color:T.muted, fontWeight:600 }}>{renderDateOffset(row.Date)}</span>
                  <span style={{ fontSize:11, fontWeight:700, color:T.muted, background:'#F3F4F6', padding:'2px 9px', borderRadius:999 }}>{row.unique_ID||'—'}</span>
                  <span style={{ fontSize:14, fontWeight:700, color:T.success }}>{price}</span>
                </div>
              </div>
            );
          })
      }
      {pages > 1 && (
        <div style={{ display:'flex', gap:5, marginTop:14, justifyContent:'flex-end', alignItems:'center' }}>
          <button onClick={()=>setPage(p=>Math.max(0,p-1))} disabled={safePg===0} style={{ padding:'5px 10px', border:`1px solid ${T.border}`, borderRadius:6, background:T.white, color:safePg===0?T.muted:T.text, fontSize:13 }}>‹</button>
          {Array.from({length:Math.min(pages,8)},(_,i)=><button key={i} onClick={()=>setPage(i)} style={{ width:30, height:30, borderRadius:6, border:`1px solid ${i===safePg?T.primary:T.border}`, background:i===safePg?T.primary:T.white, color:i===safePg?'#fff':T.text, fontSize:12, fontWeight:i===safePg?700:400 }}>{i+1}</button>)}

        </div>
      )}
    </>
  );

/* ════════════════════════════
   SHIFT STATUS CIRCLES
════════════════════════════ */
function ShiftCircles({ row }) {
  const cleaners = [];
  if (row.cleaner_1 && String(row.cleaner_1).trim() !== '' && String(row.cleaner_1).trim() !== '—') cleaners.push(1);
  if (row.cleaner_2 && String(row.cleaner_2).trim() !== '' && String(row.cleaner_2).trim() !== '—') cleaners.push(2);
  if (row.cleaner_3 && String(row.cleaner_3).trim() !== '' && String(row.cleaner_3).trim() !== '—') cleaners.push(3);
  if (cleaners.length === 0) cleaners.push(1);
  return (
    <div style={{ display:'flex', gap:4, marginTop:4 }}>
      {cleaners.map(n => {
        const stamIn  = row[`shift_start_${n}`];
        const stamOut = row[`shift_end_${n}`];
        const hasIn  = stamIn  && String(stamIn).trim()  !== '' && String(stamIn).trim()  !== '—' && String(stamIn).trim()  !== 'Loading...';
        const hasOut = stamOut && String(stamOut).trim() !== '' && String(stamOut).trim() !== '—' && String(stamOut).trim() !== 'Loading...';
        return <span key={n} style={{ fontSize:14 }} title={`Städare ${n}: ${hasOut?'Utcheckad':hasIn?'Incheckad':'Ej startad'}`}>{hasOut?'🟢':hasIn?'🟡':'🔴'}</span>;
      })}
    </div>
  );
}

function BookedData() {
  const { data, loading, error, refresh, saveRow } = useSheetData('bookedData', 'booking_data');
  const [dateRange, setDateRange] = useState(getMonthRange);
  // Stats count uses offset date for consistency with card display
  const filteredData = useMemo(() => data.filter(r => { const d=toYMDOffset(r.Date); if(!d||!dateRange.from||!dateRange.to)return true; return d>=dateRange.from&&d<=dateRange.to; }), [data, dateRange]);
  const totalRev = filteredData.reduce((s,r) => s+(parseFloat(r.Total_billable_lc)||0), 0);
  return (
    <ViewShell stats={[
      { label:'Totalt bokningar', value:filteredData.length, emoji:'📅', color:T.primary },
      { label:'Hemstädning',      value:filteredData.filter(r=>r.Type==='Hemstädning').length, emoji:'🏠', color:T.info },
      { label:'Flytt / Storstäd', value:filteredData.filter(r=>['Storstädning','Flyttstädning','Speciell Flyttstädning','Flyttstädning 0-50 kvm','Flyttstädning 50+ kvm'].includes(r.Type)).length, emoji:'📦', color:T.warning },
      { label:'Total intäkt (efter RUT)', value:totalRev.toLocaleString('sv-SE')+' kr', emoji:'💰', color:T.success },
    ]}>
      <BookingCardList rows={data} loading={loading} error={error} onRefresh={refresh} onSave={saveRow} dateRange={dateRange} onDateRangeChange={setDateRange} />
    </ViewShell>
  );
}

function Shifts() {
  const { data, loading, error, refresh, saveRow } = useSheetData('shifts', 'shifts');
  const { data: employeeData }                     = useSheetData('employees', 'cleaner');
  const [dateRange, setDateRange]                  = useState(getMonthRange);
  const cleaners = useMemo(() => employeeData.filter(e=>e.Name&&e.Name!=='Loading...'&&e.Email&&e.Email!=='Loading...').map(e=>({name:e.Name,email:e.Email})), [employeeData]);
  const today = new Date().toLocaleDateString('sv-SE', { timeZone:'Europe/Stockholm' });
  // Stats count uses offset date for consistency with card display
  const filteredData = useMemo(() => data.filter(r=>{const d=toYMDOffset(r.date);if(!d||!dateRange.from||!dateRange.to)return true;return d>=dateRange.from&&d<=dateRange.to;}), [data, dateRange]);
  return (
    <ViewShell stats={[
      { label:'Schemalagda pass',    value:filteredData.length, emoji:'⏰', color:T.primary },
      { label:'Idag',                value:filteredData.filter(r=>toYMDOffset(r.date)===today).length, emoji:'📆', color:T.warning },
      { label:'Bekräftelse skickad', value:filteredData.filter(r=>r.Confirmation_sent==='Sent').length, emoji:'✅', color:T.success },
      { label:'Uppföljning kvar',    value:filteredData.filter(r=>!r.Followup_sent||r.Followup_sent.toString().trim()==='').length, emoji:'📤', color:T.info },
    ]}>
      <ShiftCardList rows={data} loading={loading} error={error} onRefresh={refresh} onSave={saveRow} cleaners={cleaners} dateRange={dateRange} onDateRangeChange={setDateRange} />
    </ViewShell>
  );
}

/* ════════════════════════════
   NAV + SIDEBAR + LOGIN + APP
════════════════════════════ */
const NAV = [
  { id:'booking-requests', label:'Bokningsförfrågningar', emoji:'📋', title:'Bokningsförfrågningar', subtitle:'Inkommande förfrågningar via behjarta.com (Apps Script)', Component:BookingRequests },
  { id:'tickets',          label:'Obesvarade ärenden',   emoji:'🎫', title:'Obesvarade ärenden',   subtitle:'Kontaktformulär — contact-data',   Component:Tickets },
  { id:'booked-data',      label:'Bokningar',            emoji:'📅', title:'Bokningar',             subtitle:'Alla bokningar — booking_data',    Component:BookedData },
  { id:'customers',        label:'Kunder',               emoji:'👥', title:'Kunder',                subtitle:'Kundregister — customer_data',     Component:Customers },
  { id:'employees',        label:'Personal',             emoji:'🧹', title:'Personal',              subtitle:'Städpersonal — cleaner',           Component:Employees },
  { id:'shifts',           label:'Arbetspass',           emoji:'⏰', title:'Arbetspass',            subtitle:'Schema — shifts',                  Component:Shifts },
];

function Sidebar({ active, setActive, user, onLogout }) {
  return (
    <div style={{ width:236, minWidth:236, background:T.sidebar, display:'flex', flexDirection:'column', height:'100vh', position:'sticky', top:0, zIndex:20 }}>
      <div style={{ padding:'20px 18px 16px', borderBottom:'1px solid rgba(255,255,255,0.06)' }}>
        <img src="https://behjarta.com/g22.png" alt="Behjärta" style={{ height:30, display:'block' }} onError={e=>{e.target.style.display='none';}} />
        <div style={{ fontSize:10, color:'rgba(255,255,255,0.27)', letterSpacing:'0.18em', textTransform:'uppercase', fontWeight:700, marginTop:6 }}>Admin Portal</div>
      </div>
      {CONFIG.DEMO_MODE && <div style={{ margin:'10px 12px 0', padding:'6px 10px', background:'rgba(251,191,36,0.1)', border:'1px solid rgba(251,191,36,0.2)', borderRadius:7, fontSize:11, color:'#FCD34D', fontWeight:600 }}>⚠️ Demo-läge aktiv</div>}
      <nav style={{ flex:1, paddingTop:8, overflowY:'auto' }}>
        {NAV.map(item => {
          const isActive = active === item.id;
          return (
            <button key={item.id} onClick={()=>setActive(item.id)}
              style={{ display:'flex', alignItems:'center', gap:9, width:'100%', padding:'10px 18px', background:isActive?'rgba(0,150,136,0.18)':'transparent', border:'none', borderLeft:`3px solid ${isActive?T.primary:'transparent'}`, color:isActive?'#fff':'rgba(255,255,255,0.44)', fontSize:13, fontWeight:isActive?600:400, textAlign:'left', fontFamily:'inherit', transition:'all 0.13s', cursor:'pointer' }}
              onMouseEnter={e=>{if(!isActive){e.currentTarget.style.background='rgba(255,255,255,0.04)';e.currentTarget.style.color='rgba(255,255,255,0.72)';}}}
              onMouseLeave={e=>{if(!isActive){e.currentTarget.style.background='transparent';e.currentTarget.style.color='rgba(255,255,255,0.44)';}}}><span style={{ fontSize:14, flexShrink:0 }}>{item.emoji}</span><span style={{ flex:1 }}>{item.label}</span>
            </button>
          );
        })}
      </nav>
      <div style={{ padding:'12px 14px', borderTop:'1px solid rgba(255,255,255,0.06)' }}>
        <div style={{ display:'flex', alignItems:'center', gap:9, marginBottom:10, overflow:'hidden' }}>
          <div style={{ width:33, height:33, borderRadius:'50%', background:T.primary, display:'flex', alignItems:'center', justifyContent:'center', fontSize:12, fontWeight:700, color:'#fff', flexShrink:0 }}>{user?.avatar}</div>

            <div style={{ fontSize:13, fontWeight:600, color:'rgba(255,255,255,0.88)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{user?.name}</div>
            <div style={{ fontSize:10, color:'rgba(255,255,255,0.3)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{user?.email}</div>
          </div>
        </div>
        <button onClick={onLogout} style={{ width:'100%', padding:'7px', background:'rgba(255,255,255,0.05)', border:'1px solid rgba(255,255,255,0.07)', borderRadius:8, color:'rgba(255,255,255,0.38)', fontSize:12, fontFamily:'inherit', transition:'all 0.14s' }} onMouseEnter={e=>{e.currentTarget.style.background='rgba(255,255,255,0.1)';e.currentTarget.style.color='#fff';}} onMouseLeave={e=>{e.currentTarget.style.background='rgba(255,255,255,0.05)';e.currentTarget.style.color='rgba(255,255,255,0.38)';}}>Logga ut</button>
      </div>
    </div>
  );
}

function LoginPage({ onLogin }) {
  const [loading, setLoading] = useState(false);
  const [error, setError]     = useState('');
  const btnRef = useRef(null);
  useEffect(() => {
    if (!window.google?.accounts?.id) return;
    window.google.accounts.id.initialize({ client_id:CONFIG.GOOGLE_CLIENT_ID, hosted_domain:CONFIG.ALLOWED_DOMAIN, callback:(resp)=>{ try { const pl=JSON.parse(atob(resp.credential.split('.')[1])); if(!pl.email.endsWith('@'+CONFIG.ALLOWED_DOMAIN)){setError('Åtkomst nekad. Endast @'+CONFIG.ALLOWED_DOMAIN+'-konton tillåts.');return;} onLogin({name:pl.name,email:pl.email,avatar:(pl.name||'?').split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase()}); } catch { setError('Inloggning misslyckades.'); } } });
    if (btnRef.current) window.google.accounts.id.renderButton(btnRef.current, { theme:'outline', size:'large', width:340, locale:'sv' });
  }, []);
  const demoLogin = () => { setLoading(true); setTimeout(()=>onLogin({name:'Admin Behjärta',email:'admin@behjarta.com',avatar:'AB'}),900); };
  return (
    <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:'linear-gradient(140deg,#003D35 0%,#00695C 40%,#009688 70%,#26A69A 100%)', position:'relative', overflow:'hidden' }}>
      {[350,550,750].map((s,i)=><div key={i} style={{ position:'absolute', width:s, height:s, borderRadius:'50%', border:'1px solid rgba(255,255,255,0.05)', top:'50%', left:'50%', transform:`translate(-${30+i*10}%,-${50+i*5}%)`, pointerEvents:'none' }}/>)}
      <div style={{ background:T.white, borderRadius:20, padding:'44px 40px', width:'100%', maxWidth:420, boxShadow:'0 30px 80px rgba(0,0,0,0.35)', textAlign:'center', position:'relative', zIndex:1 }}>
        <img src="https://behjarta.com/g22.png" alt="Behjärta" style={{ height:42, marginBottom:8 }} onError={e=>e.target.style.display='none'}/>
        <div style={{ fontSize:10, color:T.muted, letterSpacing:'0.18em', textTransform:'uppercase', fontWeight:700, marginBottom:28 }}>Administrationsportal</div>
        <h1 style={{ fontSize:22, fontWeight:700, color:T.text, marginBottom:8 }}>Välkommen tillbaka</h1>
        <p style={{ fontSize:13, color:T.muted, marginBottom:28, lineHeight:1.65 }}>Logga in med ditt <strong style={{ color:T.primaryDark }}>@behjarta.com</strong>-konto.</p>
        {error && <div style={{ background:'#FEF2F2', border:'1px solid #FECACA', color:T.danger, padding:'10px 14px', borderRadius:10, fontSize:13, marginBottom:18, textAlign:'left' }}>⚠️ {error}</div>}
        <div ref={btnRef} style={{ display:'flex', justifyContent:'center', marginBottom:10 }} />
        {CONFIG.DEMO_MODE && <button onClick={demoLogin} disabled={loading} style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:10, width:'100%', padding:'12px', background:T.white, border:`1.5px dashed ${T.primaryMid}`, borderRadius:10, cursor:loading?'not-allowed':'pointer', fontSize:13, fontWeight:600, color:T.primaryDark, fontFamily:'inherit', opacity:loading?0.7:1 }} onMouseEnter={e=>{if(!loading)e.currentTarget.style.background=T.primaryLight;}} onMouseLeave={e=>{if(!loading)e.currentTarget.style.background=T.white;}}>{loading?<><span className="spin" style={{ width:14,height:14,border:`2px solid ${T.border}`,borderTopColor:T.primary,borderRadius:'50%'}}/>Loggar in...</>:'🧪 Demo-inloggning'}</button>}
        <div style={{ marginTop:22, padding:'11px', background:'#F8FAFC', borderRadius:10, fontSize:11, color:T.muted }}>🔒 Åtkomst begränsad till <strong>@{CONFIG.ALLOWED_DOMAIN}</strong></div>
      </div>
    </div>
  );
}

function App() {
  const [user, setUser]     = useState(null);
  const [active, setActive] = useState('booking-requests');
  const activeNav = NAV.find(n => n.id === active);
  const { Component } = activeNav;
  if (!user) return <LoginPage onLogin={setUser} />;
  return (
    <div style={{ display:'flex', height:'100vh' }}>
      <Sidebar active={active} setActive={setActive} user={user} onLogout={()=>setUser(null)} />
      <main style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        <div style={{ background:T.white, borderBottom:`1px solid ${T.border}`, padding:'13px 26px', display:'flex', alignItems:'center', justifyContent:'space-between', flexShrink:0 }}>
          <div>
            <h1 style={{ fontSize:16, fontWeight:700, color:T.text, margin:0 }}>{activeNav.title}</h1>
            <p style={{ fontSize:11, color:T.muted, marginTop:1 }}>{activeNav.subtitle}</p>
          </div>
          <div style={{ display:'flex', alignItems:'center', gap:12 }}>
            <span style={{ fontSize:11, color:T.muted }}>{new Date().toLocaleDateString('sv-SE',{weekday:'long',day:'numeric',month:'long',year:'numeric',timeZone:'Europe/Stockholm'})}</span>
            <div style={{ width:32, height:32, borderRadius:'50%', background:T.primaryLight, display:'flex', alignItems:'center', justifyContent:'center', fontSize:11, fontWeight:700, color:T.primaryDark, border:`2px solid ${T.primary}` }}>{user.avatar}</div>
          </div>
        </div>
        <div style={{ flex:1, overflowY:'auto', padding:24, background:T.bg }}>
          <div style={{ background:T.white, borderRadius:14, padding:'20px 22px', border:`1px solid ${T.border}`, minHeight:300 }}>
            <Component />
          </div>
          <div style={{ textAlign:'center', marginTop:16, fontSize:11, color:T.muted }}>
            Behjärta Admin Platform © {new Date().getFullYear()} — MS Secure Solutions AB (559189-2806)
          </div>
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
