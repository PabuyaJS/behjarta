<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Anställningsavtal – Behjärta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>

/* ── Reset & Variables ──────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue:       #1A3C6E;
  --blue-mid:   #2755a0;
  --blue-light: #D6E4F7;
  --blue-pale:  #EFF5FD;
  --ink:        #1C1C2E;
  --ink-mid:    #3D3D55;
  --ink-light:  #7A7A9A;
  --rule:       #D0DAEA;
  --paper:      #FCFCFF;
  --bg:         #EEF2F8;
  --red:        #C0392B;
  --green:      #1A7A4A;
  --radius:     6px;
  --shadow:     0 4px 32px rgba(26,60,110,0.10), 0 1px 4px rgba(26,60,110,0.06);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Page shell ─────────────────────────────────────────────────────────── */
.page-shell {
  max-width: 820px;
  margin: 0 auto;
  padding: 32px 16px 80px;
}

/* ── Status screens ─────────────────────────────────────────────────────── */
.status-screen {
  text-align: center;
  padding: 100px 32px;
}
.status-icon { font-size: 52px; margin-bottom: 20px; }
.status-title {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 28px;
  color: var(--blue);
  margin-bottom: 12px;
}
.status-body { font-size: 15px; color: var(--ink-mid); line-height: 1.6; }
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--blue-light);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 24px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Document card ──────────────────────────────────────────────────────── */
.doc-card {
  background: var(--paper);
  border-radius: 12px;
  box-shadow: var(--shadow);
  padding: 52px 56px;
  margin-bottom: 24px;
  position: relative;
}

/* Watermark stripe */
.doc-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--blue) 60%, var(--blue-mid) 100%);
  border-radius: 12px 12px 0 0;
}

/* ── Document header ────────────────────────────────────────────────────── */
.doc-header { text-align: center; margin-bottom: 36px; }
.doc-company-name {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 20px;
  font-weight: 600;
  color: var(--blue);
  letter-spacing: 0.04em;
  margin-bottom: 4px;
}
.doc-company-meta {
  font-size: 11px;
  color: var(--ink-light);
  letter-spacing: 0.02em;
  margin-bottom: 24px;
}
.doc-title-band {
  border-top: 2px solid var(--blue);
  border-bottom: 1px solid var(--blue-light);
  padding: 14px 0 10px;
  margin-bottom: 6px;
}
.doc-title-main {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--blue);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.doc-title-en {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 16px;
  font-weight: 400;
  font-style: italic;
  color: var(--ink-light);
}
.doc-subtitle {
  font-size: 12.5px;
  color: var(--ink-light);
  font-style: italic;
  margin-top: 6px;
}

/* ── Section ────────────────────────────────────────────────────────────── */
.section { margin-bottom: 28px; }
.section-title {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--blue);
  padding-bottom: 7px;
  border-bottom: 1.5px solid var(--blue-light);
  margin-bottom: 14px;
  letter-spacing: 0.02em;
}
.section-title .en {
  font-style: italic;
  font-weight: 400;
  font-size: 14px;
  color: var(--ink-light);
}

/* ── Bilingual paragraph ────────────────────────────────────────────────── */
.bi { margin-bottom: 14px; }
.bi-sv {
  font-size: 13.5px;
  line-height: 1.65;
  color: var(--ink-mid);
  text-align: justify;
  margin-bottom: 3px;
}
.bi-en {
  font-size: 12px;
  line-height: 1.55;
  color: var(--ink-light);
  font-style: italic;
  text-align: justify;
}

/* ── Table ──────────────────────────────────────────────────────────────── */
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  margin-bottom: 16px;
}
.data-table th {
  background: var(--blue-pale);
  color: var(--blue);
  font-weight: 600;
  padding: 9px 12px;
  border: 1px solid var(--rule);
  font-size: 12px;
  text-align: left;
}
.data-table td {
  padding: 8px 12px;
  border: 1px solid var(--rule);
  color: var(--ink-mid);
  vertical-align: top;
  line-height: 1.5;
}
.data-table td.en {
  color: var(--ink-light);
  font-style: italic;
}
.data-table tr:nth-child(even) td { background: var(--blue-pale); }
.data-table .field-key {
  font-weight: 500;
  color: var(--ink);
  white-space: nowrap;
  width: 1%;
}

/* ── Bullets ────────────────────────────────────────────────────────────── */
.bi-list { padding-left: 0; list-style: none; margin: 10px 0 16px; }
.bi-list li {
  font-size: 13.5px;
  color: var(--ink-mid);
  padding: 4px 0 4px 22px;
  position: relative;
  line-height: 1.55;
}
.bi-list li::before {
  content: '';
  position: absolute;
  left: 6px;
  top: 11px;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--blue-mid);
}
.bi-list li .li-en {
  color: var(--ink-light);
  font-style: italic;
  font-size: 12px;
}

/* ── Signature section ──────────────────────────────────────────────────── */
.sig-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  margin-top: 20px;
}
.sig-block { }
.sig-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--ink);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 2px;
}
.sig-label-en {
  font-size: 11px;
  color: var(--ink-light);
  font-style: italic;
  text-transform: none;
  letter-spacing: 0;
}
.sig-prefill {
  font-family: 'Dancing Script', cursive;
  font-size: 36px;
  color: var(--ink);
  line-height: 1.2;
  margin: 8px 0 4px;
}
.sig-name-sub {
  font-size: 11.5px;
  color: var(--ink-light);
  border-top: 1px solid var(--rule);
  padding-top: 6px;
  margin-top: 6px;
}
.sig-place-date {
  grid-column: 1 / -1;
  font-size: 13.5px;
  color: var(--ink-mid);
  padding: 10px 14px;
  background: var(--blue-pale);
  border-radius: var(--radius);
  border: 1px solid var(--rule);
}
.sig-place-date strong { color: var(--blue); }

/* canvas pad */
.pad-wrap { position: relative; }
.sig-canvas {
  width: 100%;
  height: 130px;
  border: 1.5px dashed var(--rule);
  border-radius: var(--radius);
  background: var(--blue-pale);
  cursor: crosshair;
  touch-action: none;
  display: block;
  transition: border-color 0.2s;
}
.sig-canvas.touched { border-color: var(--blue-mid); border-style: solid; }
.pad-hint {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 12px;
  color: var(--ink-light);
  pointer-events: none;
  text-align: center;
  transition: opacity 0.2s;
  user-select: none;
}
.pad-hint.hidden { opacity: 0; }
.pad-actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 6px;
}
.btn-clear {
  font-size: 11.5px;
  color: var(--ink-light);
  background: none;
  border: none;
  cursor: pointer;
  text-decoration: underline;
  padding: 0;
}
.btn-clear:hover { color: var(--red); }
.pad-status { font-size: 11px; color: var(--green); font-weight: 500; }

/* Name input */
.name-input-wrap { margin-top: 14px; }
.name-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 5px;
  display: block;
}
.name-label .req { color: var(--red); margin-left: 2px; }
.name-input {
  width: 100%;
  border: none;
  border-bottom: 1.5px solid var(--rule);
  background: transparent;
  padding: 7px 2px;
  font-size: 14.5px;
  font-family: 'DM Sans', sans-serif;
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s;
}
.name-input:focus { border-bottom-color: var(--blue); }
.name-input::placeholder { color: var(--ink-light); font-style: italic; }

/* ── Arrow indicator ────────────────────────────────────────────────────── */
.arrow-cue {
  display: none;
  text-align: center;
  padding: 28px 0;
  animation: cue-bounce 0.9s ease-in-out infinite;
}
.arrow-cue.visible { display: block; }
.arrow-cue-inner {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  color: var(--blue);
  background: var(--blue-pale);
  border: 1.5px solid var(--blue-light);
  border-radius: 50px;
  padding: 12px 28px;
}
.arrow-cue-inner svg { width: 22px; height: 22px; }
.arrow-cue-text { font-size: 13px; font-weight: 500; }
@keyframes cue-bounce {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(8px); }
}

/* ── Submit section ─────────────────────────────────────────────────────── */
.submit-section {
  display: none;
  text-align: center;
  padding: 40px 24px;
  background: var(--paper);
  border-radius: 12px;
  box-shadow: var(--shadow);
}
.submit-section.visible { display: block; }
.submit-note {
  font-size: 13.5px;
  color: var(--ink-mid);
  margin-bottom: 6px;
}
.submit-note-en {
  font-size: 12px;
  color: var(--ink-light);
  font-style: italic;
  margin-bottom: 28px;
}
.btn-submit {
  background: var(--blue);
  color: #fff;
  border: none;
  padding: 16px 56px;
  font-size: 15px;
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  border-radius: 50px;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(26,60,110,0.25);
}
.btn-submit:hover:not(:disabled) {
  background: #0f2a50;
  transform: translateY(-1px);
  box-shadow: 0 6px 28px rgba(26,60,110,0.32);
}
.btn-submit:active:not(:disabled) { transform: translateY(0); }
.btn-submit:disabled {
  background: #a0aec0;
  cursor: not-allowed;
  box-shadow: none;
}
.submit-progress {
  font-size: 13px;
  color: var(--ink-light);
  margin-top: 14px;
  min-height: 20px;
}

/* ── Success screen ─────────────────────────────────────────────────────── */
.success-screen {
  text-align: center;
  padding: 60px 32px;
  background: var(--paper);
  border-radius: 12px;
  box-shadow: var(--shadow);
}
.success-check {
  width: 64px; height: 64px;
  background: #E6F4EE;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  font-size: 32px;
}
.success-title {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 28px;
  color: var(--blue);
  margin-bottom: 10px;
}
.success-body { font-size: 14px; color: var(--ink-mid); line-height: 1.6; }
.success-body em { color: var(--ink-light); font-style: italic; }

/* ── Responsive ─────────────────────────────────────────────────────────── */
@media (max-width: 640px) {
  .doc-card { padding: 32px 20px; }
  .sig-grid { grid-template-columns: 1fr; }
  .doc-title-main { font-size: 18px; }
  .data-table { font-size: 12px; }
  .data-table td, .data-table th { padding: 7px 8px; }
}

@media print {
  body { background: white; }
  .doc-card { box-shadow: none; }
  .pad-hint, .btn-clear, .pad-actions, .arrow-cue,
  .submit-section, .pad-status { display: none !important; }
}

</style>
</head>
<body>

<div class="page-shell">

  <!-- Loading -->
  <div id="stateLoading" class="status-screen">
    <div class="spinner"></div>
    <div class="status-title">Laddar avtal…</div>
    <div class="status-body" style="font-style:italic;color:var(--ink-light)">Loading contract…</div>
  </div>

  <!-- Error -->
  <div id="stateError" class="status-screen" style="display:none">
    <div class="status-icon">⚠️</div>
    <div class="status-title" id="errorTitle">Något gick fel</div>
    <div class="status-body" id="errorBody"></div>
  </div>

  <!-- Contract wrapper (injected by JS) -->
  <div id="contractWrap" style="display:none"></div>

  <!-- Arrow cue (between the two docs) -->
  <div class="arrow-cue" id="arrowCue">
    <div class="arrow-cue-inner">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M12 5v14M5 12l7 7 7-7"/>
      </svg>
      <span class="arrow-cue-text">Signera även Uppförandekoden nedan<br><em style="font-style:italic;font-weight:300;font-size:11px">Also sign the Code of Conduct below</em></span>
    </div>
  </div>

  <!-- Code of conduct wrapper -->
  <div id="conductWrap" style="display:none"></div>

  <!-- Submit -->
  <div class="submit-section" id="submitSection">
    <p class="submit-note">✅ Båda dokumenten är signerade.</p>
    <p class="submit-note-en">Both documents have been signed.</p>
    <button class="btn-submit" id="submitBtn" onclick="submitContract()">
      Skicka in &amp; signera &nbsp;/&nbsp; Submit &amp; Sign
    </button>
    <div class="submit-progress" id="submitProgress"></div>
  </div>

  <!-- Success (replaces everything) -->
  <div id="stateSuccess" style="display:none">
    <div class="success-screen">
      <div class="success-check">✅</div>
      <div class="success-title" id="successTitle">Tack!</div>
      <div class="success-body" id="successBody"></div>
    </div>
  </div>

</div><!-- /page-shell -->

<!-- html2pdf loaded dynamically at submit time -->

<script>
// ════════════════════════════════════════════════════════════════════════════
//  CONFIG  –  replace with your deployed Apps Script Web App URL
// ════════════════════════════════════════════════════════════════════════════
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwH2BQzUFuTIxzxliYjpFi02V3wsn_6DU5XHJTcLZD8rM2_oLu7MvuukExqZ93RQqvr/exec';

// ── State ────────────────────────────────────────────────────────────────────
let contractData = null;
let sig1Signed   = false;
let sig2Signed   = false;
let nameEntered  = false;

// ── Boot ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  const params     = new URLSearchParams(window.location.search);
  const contractId = params.get('id');

  if (!contractId) { return showError('Inget avtals-ID angivet.', 'No contract ID in the URL. Please use the link sent to you.'); }

  try {
    const res  = await fetch(`${APPS_SCRIPT_URL}?action=getContract&id=${encodeURIComponent(contractId)}`);
    const data = await res.json();

    if (data.error) {
      if (data.error === 'Contract already submitted') {
        return showError('Avtalet är redan signerat.', 'This contract has already been signed and submitted.');
      }
      return showError('Avtalet hittades inte.', data.error);
    }

    contractData = data;
    renderDocuments(data);

    document.getElementById('stateLoading').style.display = 'none';
    document.getElementById('contractWrap').style.display  = 'block';
    document.getElementById('conductWrap').style.display   = 'block';

    initPad('pad1', 1);
    initPad('pad2', 2);

  } catch (err) {
    showError('Kunde inte ladda avtalet.', 'Could not load the contract. Please try refreshing the page. (' + err.message + ')');
  }
});

// ── Error helper ─────────────────────────────────────────────────────────────
function showError(sv, en) {
  document.getElementById('stateLoading').style.display = 'none';
  document.getElementById('stateError').style.display   = 'flex';
  document.getElementById('stateError').style.flexDirection = 'column';
  document.getElementById('errorTitle').textContent = sv;
  document.getElementById('errorBody').innerHTML    = `<em>${en}</em>`;
}

// ════════════════════════════════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════════════════════════════════
function renderDocuments(d) {
  const { employee, salary, date } = d;
  const placeDate = `Stockholm, ${date}`;

  document.getElementById('contractWrap').innerHTML  = buildEmploymentAgreement(employee, salary, date, placeDate);
  document.getElementById('conductWrap').innerHTML   = buildCodeOfConduct(placeDate);
}

// ── Company doc header ────────────────────────────────────────────────────────
function docHeader(titleSv, titleEn, subtitle) {
  return `
  <div class="doc-header">
    <div class="doc-company-name">MS Secure Solutions AB (Behjärta)</div>
    <div class="doc-company-meta">Org.nr: 559189-2806 &nbsp;|&nbsp; Ekebergabacken 58, 123 63 Farsta &nbsp;|&nbsp; www.behjarta.com &nbsp;|&nbsp; hej@behjarta.com</div>
    <div class="doc-title-band">
      <div class="doc-title-main">${titleSv}</div>
      <div class="doc-title-en">${titleEn}</div>
    </div>
    <div class="doc-subtitle">${subtitle}</div>
  </div>`;
}

function sec(num, sv, en, body) {
  return `<div class="section">
    <div class="section-title">${num}. ${sv} <span class="en">/&nbsp;${en}</span></div>
    ${body}
  </div>`;
}

function bi(sv, en) {
  return `<div class="bi"><p class="bi-sv">${sv}</p><p class="bi-en">${en}</p></div>`;
}

function bul(items) {
  return '<ul class="bi-list">' + items.map(([sv,en]) =>
    `<li>${sv} <span class="li-en">/ ${en}</span></li>`).join('') + '</ul>';
}

function twoCol(rows, headers) {
  const hdr = headers ? `<tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr>` : '';
  const body = rows.map(cells =>
    `<tr>${cells.map((c,i)=>`<td${i>0?' class="en"':''}>${c}</td>`).join('')}</tr>`
  ).join('');
  return `<table class="data-table">${hdr}${body}</table>`;
}

function sigBlock(placeDate, padId, showName) {
  return `
  <div class="sig-place-date"><strong>Ort och datum / Place and Date:</strong> &nbsp;${placeDate}</div>
  <div class="sig-grid" style="margin-top:20px">

    <div class="sig-block">
      <div class="sig-label">Arbetsgivarens underskrift <span class="sig-label-en">/ Employer's Signature</span></div>
      <div class="sig-prefill">Jovan Senicanin</div>
      <div class="sig-name-sub">MS Secure Solutions AB (Behjärta)</div>
    </div>

    <div class="sig-block">
      <div class="sig-label">Arbetstagarens underskrift <span class="sig-label-en">/ Employee's Signature</span> <span style="color:var(--red)">*</span></div>
      <div class="pad-wrap">
        <canvas id="${padId}" class="sig-canvas"></canvas>
        <div class="pad-hint" id="${padId}Hint">✍️ Rita din signatur här<br><em style="font-size:11px">Draw your signature here</em></div>
      </div>
      <div class="pad-actions">
        <button class="btn-clear" onclick="clearPad('${padId}', ${padId==='pad1'?1:2})">Rensa / Clear</button>
        <span class="pad-status" id="${padId}Status"></span>
      </div>
      ${showName ? `
      <div class="name-input-wrap">
        <label class="name-label" for="nameInPrint">
          Namnförtydligande / Name in print <span class="req">*</span>
        </label>
        <input type="text" id="nameInPrint" class="name-input"
          placeholder="Skriv ditt fullständiga namn / Type your full name"
          oninput="onNameInput()" autocomplete="name" inputmode="text">
      </div>` : ''}
    </div>

  </div>`;
}

// ── Employment Agreement ──────────────────────────────────────────────────────
function buildEmploymentAgreement(e, s, date, placeDate) {
  return `<div class="doc-card" id="docEA">
    ${docHeader('ANSTÄLLNINGSAVTAL', 'EMPLOYMENT AGREEMENT', 'Tidsbegränsad anställning – Lokalvårdare &nbsp;/&nbsp; Fixed-Term Employment – Cleaner')}

    ${sec(1,'Arbetsgivare','Employer', twoCol([
      ['Företag / Company', 'MS Secure Solutions AB (Behjärta)'],
      ['Org.nr / Reg. No.', '559189-2806'],
      ['Adress / Address', 'Ekebergabacken 58, 123 63 Farsta'],
      ['Webbplats / Website', 'www.behjarta.com'],
      ['E-post / Email', 'hej@behjarta.com']
    ], ['Uppgift / Field', 'Värde / Value']))}

    ${sec(2,'Arbetstagare','Employee', twoCol([
      ['Namn / Full Name', escHtml(e.name)],
      ['Personnummer / Personal ID No.', escHtml(e.personalId)],
      ['Adress / Address', escHtml(e.address)],
      ['Telefon / Phone', escHtml(e.phone)],
      ['E-post / Email', escHtml(e.email)]
    ], ['Uppgift / Field', 'Värde / Value']))}

    ${sec(3,'Anställningens form och period','Employment Type and Period', `
      ${bi('Anställningsform: Tidsbegränsad anställning vid behov (timanställning), i enlighet med Lag (1982:80) om anställningsskydd (LAS) och dess bestämmelser om allmän visstidsanställning (ALVA).',
           'Employment type: Fixed-term employment on demand (hourly), in accordance with the Employment Protection Act (LAS) and its provisions on general fixed-term employment (ALVA).')}

//  SIGNATURE PAD
// ════════════════════════════════════════════════════════════════════════════
function initPad(canvasId, padNum) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx  = canvas.getContext('2d');
  let drawing = false;
  let lastX = 0, lastY = 0;

  function resize() {
    const dpr  = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const w    = rect.width  * dpr;
    const h    = rect.height * dpr;
    // Preserve existing drawing if re-sizing
    const imgData = canvas.width > 0 ? ctx.getImageData(0, 0, canvas.width, canvas.height) : null;
    canvas.width  = w;
    canvas.height = h;
    ctx.scale(dpr, dpr);
    ctx.strokeStyle = '#1C1C2E';
    ctx.lineWidth   = 2.2;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    if (imgData) ctx.putImageData(imgData, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  function xy(e) {
    const r = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: src.clientX - r.left, y: src.clientY - r.top };
  }

  function start(e) {
    e.preventDefault();
    drawing = true;
    const p = xy(e);
    lastX = p.x; lastY = p.y;
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    // Hide hint
    const hint = document.getElementById(canvasId + 'Hint');
    if (hint) hint.classList.add('hidden');
    canvas.classList.add('touched');
  }

  function move(e) {
    if (!drawing) return;
    e.preventDefault();
    const p = xy(e);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    lastX = p.x; lastY = p.y;
  }

  function end() {
    if (!drawing) return;
    drawing = false;
    markSigned(canvasId, padNum);
  }

  canvas.addEventListener('mousedown',  start);
  canvas.addEventListener('mousemove',  move);
  canvas.addEventListener('mouseup',    end);
  canvas.addEventListener('mouseleave', end);
  canvas.addEventListener('touchstart', start, { passive: false });
  canvas.addEventListener('touchmove',  move,  { passive: false });
  canvas.addEventListener('touchend',   end);
}

function markSigned(canvasId, padNum) {
  const statusEl = document.getElementById(canvasId + 'Status');
  if (statusEl) statusEl.textContent = '✓ Signerad / Signed';

  if (padNum === 1) {
    sig1Signed = true;
    // Show arrow cue
    document.getElementById('arrowCue').classList.add('visible');
    document.getElementById('arrowCue').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  if (padNum === 2) {
    sig2Signed = true;
    document.getElementById('arrowCue').classList.remove('visible');
  }
  checkAllSigned();
}

function clearPad(canvasId, padNum) {
  const canvas = document.getElementById(canvasId);
  const ctx    = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  canvas.classList.remove('touched');

  const hint = document.getElementById(canvasId + 'Hint');
  if (hint) hint.classList.remove('hidden');

  const statusEl = document.getElementById(canvasId + 'Status');
  if (statusEl) statusEl.textContent = '';

  if (padNum === 1) { sig1Signed = false; document.getElementById('arrowCue').classList.remove('visible'); }
  if (padNum === 2) sig2Signed = false;
  checkAllSigned();
}

function onNameInput() {
  const val = (document.getElementById('nameInPrint')?.value || '').trim();
  nameEntered = val.length >= 2;
  checkAllSigned();
}

function checkAllSigned() {
  const ready = sig1Signed && sig2Signed && nameEntered;
  const section = document.getElementById('submitSection');
  if (ready && !section.classList.contains('visible')) {
    section.classList.add('visible');
    setTimeout(() => section.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
  } else if (!ready) {
    section.classList.remove('visible');
  }
}

//  SUBMIT  –  PDF generated server-side by Apps Script / Google Drive
// ════════════════════════════════════════════════════════════════════════════
async function submitContract() {
  const btn      = document.getElementById('submitBtn');
  const progress = document.getElementById('submitProgress');
  btn.disabled   = true;

  try {
    const nameInPrint = document.getElementById('nameInPrint').value.trim();
    // Capture signatures as data URLs
    const sig1 = document.getElementById('pad1').toDataURL('image/png');
    const sig2 = document.getElementById('pad2').toDataURL('image/png');

    progress.textContent = 'Skickar… / Sending…';

    // Send data + signatures to Apps Script — PDF is built server-side
    const payload = {
      action:      'submit',
      contractId:  contractData.contractId,
      nameInPrint,
      sig1,
      sig2
    };

    const res    = await fetch(APPS_SCRIPT_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'text/plain' },
      body:    JSON.stringify(payload)
    });
    const result = await res.json();

    if (result.success) {
      document.getElementById('contractWrap').style.display  = 'none';
      document.getElementById('conductWrap').style.display   = 'none';
      document.getElementById('arrowCue').style.display      = 'none';
      document.getElementById('submitSection').style.display = 'none';

      const successEl = document.getElementById('stateSuccess');
      successEl.style.display = 'block';
      document.getElementById('successTitle').textContent = `Tack, ${contractData.employee.name}!`;
      document.getElementById('successBody').innerHTML =
        `Ditt avtal har signerats och en kopia har skickats till <strong>${contractData.employee.email}</strong>.<br>
         <em>Your agreement has been signed and a copy has been sent to <strong>${contractData.employee.email}</strong>.</em>`;
      window.scrollTo({ top: 0, behavior: 'smooth' });

    } else {
      throw new Error(result.error || 'Unknown server error');
    }

  } catch (err) {
    btn.disabled = false;
    progress.textContent = '';
    alert('Ett fel uppstod. Försök igen.\nAn error occurred. Please try again.\n\n' + err.message);
  }
}

// ── Utility ───────────────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
